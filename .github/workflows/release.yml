name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS Intel
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS ARM
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Linux
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.deb
            dist/*.AppImage
          retention-days: 5

  release:
    needs: [build-macos-intel, build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TimerWidget ${{ github.ref_name }}"
          generate_release_notes: false
          body: |
            # TimerWidget ${{ github.ref_name }}

            Прозрачный таймер-виджет для презентаций и рабочего стола — 4 окна, 4 стиля, полностью офлайн.

            ## ✨ Что нового в v2.3

            ### Design System v3 — VisionOS glass во всех окнах
            - Единые дизайн-токены (`design-tokens.css`): палитра Apple, блюры, тени, тайминги
            - **HSV color picker** — полноценный выбор цвета (hue + SV + hex) вместо пресетов, независимые инстансы для каждого окна
            - **Slide-out drawer** — компактная панель управления 380 px с выдвижной боковой панелью настроек (macOS detail-pane pattern)
            - Адаптивная высота панели под активную вкладку
            - Новая иконка приложения — неоновые песочные часы

            ### Управление
            - **Ручной ввод времени** — `sec`, `min:sec` или `hr:min:sec` (до 99:59:59)
            - **Клик по проценту масштаба** — точный ввод значения, двойной клик — сброс
            - **Shift + колесо** на полноэкранном — отдельное масштабирование инфо-блоков
            - Кнопки «свернуть / оконный режим / закрыть» на полноэкранном появляются при наведении

            ### Безопасность (обработан security-свип v2.2.0)
            - Удалена загрузка HTTP(S) фоновых изображений — только локальные `data:` URL
            - Chromium Component Updater полностью отключён — приложение не обращается в сеть
            - DevTools выключены во всех production-окнах
            - `LICENSES.chromium.html` очищается от внешнего политического контента через electron-builder `afterPack`
            - Linux: `chrome-sandbox` без SUID-бита (0755), приложение с `--no-sandbox`
            - Валидация изображений и аудио через MIME + magic bytes (WebP RIFF, MP3/WAV/OGG/FLAC/WebM/AAC)

            ### Исправления
            - Windows 11: убрана белая кайма DWM вокруг полноэкранного режима (`thickFrame: false`)
            - Полноэкранный: нет белых полос на ultrawide / фракционной DPI (`backgroundColor:#000`)
            - Overtime-статус корректно показывается во всех 3 окнах (widget/clock/display)
            - Инфо-блоки не прилегают вплотную к краям экрана (20 px clamping при Alt-drag)
            - Drawer + высота панели: ручная высота больше не сбрасывается при открытии/закрытии drawer'а
            - Масштаб таймера не сбрасывается при смене цвета/темы

            ## 📦 Скачать

            | Платформа | Файл | Описание |
            |:----------|:-----|:---------|
            | 🪟 Windows | `TimerWidget-Setup-*.exe` | Установщик (NSIS) |
            | 🪟 Windows | `TimerWidget-Portable.exe` | Портативная версия |
            | 🍎 macOS Apple Silicon | `*-arm64.dmg` | Для M1/M2/M3/M4 |
            | 🍎 macOS Intel | `*-x64.dmg` | Для Intel Mac |
            | 🐧 Linux | `*.deb` | Debian / Ubuntu |
            | 🐧 Linux | `*.AppImage` | Универсальный |

            > **macOS**: приложение не подписано Apple Developer сертификатом. При первом запуске: **правый клик** → **Открыть** → подтвердить. Или в терминале: `xattr -cr /Applications/TimerWidget.app`
            >
            > **Linux (.deb)**: `chrome-sandbox` ставится без SUID, приложение запускается с `--no-sandbox` — user namespaces не требуются.

            ## 🛡️ Требования

            - Windows 10/11 (x64)
            - macOS 11+ (Intel или Apple Silicon)
            - Linux (glibc 2.28+)

            Приложение работает **полностью оффлайн** — шрифты бандлятся локально, звуки синтезируются через Web Audio API, Chromium никуда не стучится.

            ---
            Electron 41 · Node.js 22 · Vanilla JS · 126 тестов · полный [CHANGELOG](https://github.com/Jkaotlic/timer-widget/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
