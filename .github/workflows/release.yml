name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS Intel
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS ARM
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Linux
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.deb
            dist/*.AppImage
          retention-days: 5

  release:
    needs: [build-macos-intel, build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TimerWidget ${{ github.ref_name }}"
          generate_release_notes: false
          body: |
            # TimerWidget ${{ github.ref_name }}

            ## Что нового в 2.2

            ### Полноэкранный режим — управление окном
            - Кнопки **свернуть**, **оконный режим** и **закрыть** — появляются при наведении мыши
            - Переключение полноэкранный/оконный режим (как зелёная кнопка macOS)
            - В оконном режиме окно перетаскивается мышью

            ### Панель управления — новые возможности
            - **HSV-палитра цвета** для виджета, часов и полноэкранного режима
            - **Ручной ввод времени** — парсинг sec / min:sec / hr:min:sec
            - **Клик по проценту масштаба** — точный ввод значения, двойной клик — сброс
            - Адаптивная высота окна под активную вкладку

            ### Исправления
            - Масштаб полноэкранного режима больше не сбрасывается при смене цвета/темы
            - Кнопка «Сбросить настройки» теперь работает корректно
            - Убраны слайдеры масштаба — только Ctrl+колесо

            ## Скачать

            | Платформа | Файл | Описание |
            |-----------|------|----------|
            | 🪟 Windows | `TimerWidget-Setup-*.exe` | Установщик (NSIS) |
            | 🪟 Windows | `TimerWidget-Portable.exe` | Портативная версия |
            | 🍎 macOS Apple Silicon | `*-arm64.dmg` | Для M1/M2/M3/M4 |
            | 🍎 macOS Intel | `*-x64.dmg` | Для Intel Mac |
            | 🐧 Linux | `*.deb` | Debian/Ubuntu |
            | 🐧 Linux | `*.AppImage` | Универсальный |

            > **macOS**: приложение не подписано. При первом запуске: **правый клик** → **Открыть** → подтвердить. Или в терминале: `xattr -cr /Applications/TimerWidget.app`

            ---
            *Built with Electron 41 + vanilla JS. No frameworks, no bundler.*
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
