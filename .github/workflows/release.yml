name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS Intel
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS ARM
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Linux
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.deb
            dist/*.AppImage
          retention-days: 5

  release:
    needs: [build-macos-intel, build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TimerWidget ${{ github.ref_name }}"
          generate_release_notes: false
          body: |
            # TimerWidget ${{ github.ref_name }}

            ## Что нового в 2.1

            ### Масштабирование колесом мыши
            - **Ctrl+колесо** на виджете и часах — быстрое масштабирование
            - **Ctrl+колесо** в полноэкранном режиме — масштаб таймера (30–300%)
            - **Shift+колесо** в полноэкранном режиме — масштаб блоков времени (50–600%)
            - Масштаб больше не сбрасывается при смене цвета, стиля или настроек

            ### Новые звуки
            - 30 встроенных звуков (было 20) — добавлены громкие: тарелки, глубокий гонг, воздушный рожок, сирена, церковный колокол, барабанная дробь, корабельный гудок, металлический удар, эпичная труба

            ### Overtime визуал
            - Двоеточия в перекидном стиле теперь краснеют при перерасходе (виджет + полноэкранный)
            - Минус-знак больше не накладывается на цифры (круговой и аналоговый стили)
            - Улучшена пульсация перекидных карточек (плавная opacity вместо box-shadow)

            ### Production hardening
            - Убрано стандартное меню Electron (File/Edit/View/Help) на всех ОС
            - Отключены DevTools в панели управления
            - Заблокирован Ctrl+колесо зум страницы на всех окнах

            ### Исправления
            - Часы: перекидной стиль — исправлена обрезка первой и последней карточек
            - Часы: стиль теперь меняется из вкладки «Часы» (не привязан к виджету)
            - Синхронизация стилей виджет/часы отключена по умолчанию
            - Подсказки обновлены с упоминанием Ctrl+колесо

            ## Скачать

            | Платформа | Файл | Описание |
            |-----------|------|----------|
            | 🪟 Windows | `TimerWidget-Setup-2.1.0.exe` | Установщик (NSIS) |
            | 🪟 Windows | `TimerWidget-Portable.exe` | Портативная версия |
            | 🍎 macOS Apple Silicon | `TimerWidget-2.1.0-arm64.dmg` | Для M1/M2/M3/M4 |
            | 🍎 macOS Intel | `TimerWidget-2.1.0-x64.dmg` | Для Intel Mac |
            | 🐧 Linux | `TimerWidget-2.1.0-amd64.deb` | Debian/Ubuntu |
            | 🐧 Linux | `TimerWidget-2.1.0-x86_64.AppImage` | Универсальный |

            ---
            *Built with Electron 41 + vanilla JS. No frameworks, no bundler.*
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
