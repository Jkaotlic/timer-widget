        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: var(--tw-font-sans);
            /* Near-transparent background enables drag/hit-testing on Windows transparent windows */
            background: rgba(0, 0, 0, 0.01);
            overflow: hidden;
            color: var(--tw-fg);
            -webkit-font-smoothing: antialiased;
        }

        /* Рамка окна - скрыта по умолчанию, видна при наведении */
        /* Border and resize handles removed — scaling via scale bar slider */

        .widget-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* drag handled via JS */
            container-type: size;
            container-name: widget;
        }

        /* ============================================
           СТИЛЬ: КРУГОВОЙ (Circle)
           ============================================ */
        .circular-widget {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5%;
            box-sizing: border-box;
        }

        .widget-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        /* Фоновый круг с градиентом */
        .bg-circle {
            fill: var(--tw-bg-timer);
            stroke: var(--tw-border-strong);
            stroke-width: 1.5;
        }

        /* Декоративный внутренний круг */
        .inner-glow {
            fill: none;
            stroke: var(--tw-divider);
            stroke-width: 1;
        }

        /* Трек секундной стрелки (фон) */
        .seconds-track {
            fill: none;
            stroke: var(--tw-border);
            stroke-width: 6;
        }

        /* Прогресс секунд */
        .seconds-bar {
            fill: none;
            stroke: url(#clockGradient);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset var(--tw-dur-base) linear;
            /* SVG drop-shadow is safe on a stroke even on transparent windows */
            filter: drop-shadow(0 0 6px rgba(10, 132, 255, 0.45));
        }

        /* Шкала с делениями */
        .tick-marks {
            stroke: var(--tw-border-strong);
            stroke-width: 1;
        }

        .tick-marks-major {
            stroke: var(--tw-fg-dim);
            stroke-width: 2;
        }

        /* Центральный контент */
        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .time-display {
            font-size: clamp(1.2rem, min(20vw, 20vh), 20rem);
            font-weight: 200;
            color: var(--tw-fg);
            font-family: var(--tw-font-display);
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.5),
                var(--tw-glow-blue);
            transition: color var(--tw-dur-base) var(--tw-ease),
                        text-shadow var(--tw-dur-base) var(--tw-ease);
            white-space: nowrap;
            line-height: 1;
        }

        /* ============================================
           Шильдики даты и часового пояса (базовые)
           ============================================ */
        .date-badge {
            margin-top: clamp(4px, 2vh, 16px);
            padding: clamp(4px, 1.5vh, 10px) clamp(10px, 4vw, 24px);
            border-radius: var(--tw-r-pill);
            font-size: clamp(0.5rem, min(4.5vw, 4.5vh), 5rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--tw-overlay-medium);
            color: var(--tw-fg-secondary);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            border: 1px solid var(--tw-border);
            transition: background var(--tw-dur-slow) var(--tw-ease),
                        color var(--tw-dur-slow) var(--tw-ease);
        }

        /* Digital: LED-style date plate on dark enclosure */
        body.style-digital .date-badge {
            background: var(--tw-bg-led);
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-r-sm);
            color: var(--tw-led-green);
            text-shadow: 0 0 8px currentColor;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
            font-family: var(--tw-font-mono);
        }

        /* Flip: split-flap style date card */
        body.style-flip .date-badge {
            background: linear-gradient(180deg, rgba(42,42,53,0.85) 0%, rgba(26,26,37,0.85) 100%);
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-r-xs);
            color: var(--tw-fg-secondary);
            font-family: var(--tw-font-sans);
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        /* Часовой пояс */
        .timezone-badge {
            margin-top: clamp(2px, 1vh, 8px);
            padding: clamp(2px, 0.8vh, 6px) clamp(6px, 2vw, 14px);
            border-radius: var(--tw-r-md);
            font-size: clamp(0.4rem, min(3.5vw, 3.5vh), 4rem);
            font-weight: 500;
            letter-spacing: 0.05em;
            background: var(--tw-overlay-light);
            color: var(--tw-fg-muted);
            font-family: var(--tw-font-mono);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            border: 1px solid var(--tw-border);
            transition: background var(--tw-dur-slow) var(--tw-ease),
                        color var(--tw-dur-slow) var(--tw-ease);
            display: none;
        }

        .timezone-badge.visible {
            display: inline-block;
        }

        body.style-digital .timezone-badge {
            background: var(--tw-bg-led);
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-r-xs);
            color: var(--tw-led-green);
            text-shadow: 0 0 6px currentColor;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            font-family: var(--tw-font-mono);
        }

        body.style-flip .timezone-badge {
            background: linear-gradient(180deg, rgba(34,34,42,0.85) 0%, rgba(26,26,32,0.85) 100%);
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-r-xs);
            color: var(--tw-fg-muted);
            font-family: var(--tw-font-mono);
            font-weight: 500;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        /* ============================================
           Кнопки управления (overlay — сохранено на будущее)
           ============================================ */
        .controls-overlay {
            position: absolute;
            top: clamp(8px, 5%, 30px);
            right: clamp(8px, 5%, 30px);
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            gap: clamp(6px, 2vw, 16px);
            opacity: 0;
            transition: opacity var(--tw-dur-base) var(--tw-ease);
            -webkit-app-region: no-drag;
            z-index: 100;
            pointer-events: none;
            box-sizing: border-box;
        }

        body.mouse-active .controls-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .ctrl-btn {
            width: clamp(24px, min(8vw, 8vh), 44px);
            height: clamp(24px, min(8vw, 8vh), 44px);
            border-radius: 50%;
            border: 1px solid var(--tw-border);
            background: var(--tw-overlay-medium);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            color: var(--tw-fg);
            pointer-events: auto;
            -webkit-app-region: no-drag;
            font-size: clamp(10px, min(3vw, 3vh), 18px);
            cursor: pointer;
            transition: background var(--tw-dur-base) var(--tw-ease),
                        transform var(--tw-dur-fast) var(--tw-ease);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: var(--tw-overlay-medium);
            transform: scale(1.08);
        }

        .ctrl-btn.close:hover {
            background: rgba(255, 68, 68, 0.6);
        }

        .ctrl-btn:focus-visible {
            outline: none;
            box-shadow: var(--tw-focus-ring);
        }

        /* ============================================
           Панель настроек (не отображается в этом окне, но стили сохранены)
           ============================================ */
        .settings-panel {
            position: absolute;
            top: 15%;
            right: 10%;
            background: var(--tw-bg-glass);
            -webkit-backdrop-filter: var(--tw-blur);
            backdrop-filter: var(--tw-blur);
            border-radius: var(--tw-r-xl);
            padding: clamp(10px, 4%, 20px);
            min-width: min(180px, 70%);
            max-width: 90%;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.95);
            transition: opacity var(--tw-dur-base) var(--tw-ease),
                        transform var(--tw-dur-base) var(--tw-ease);
            border: 1px solid var(--tw-border);
            z-index: 1000;
            -webkit-app-region: no-drag;
            box-shadow: var(--tw-shadow-inner-top);
        }

        .settings-panel.visible {
            opacity: 1;
            pointer-events: auto !important;
            transform: translateY(0) scale(1);
        }

        .settings-title {
            color: var(--tw-fg);
            font-size: 0.75em;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.7;
        }

        .size-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 14px;
        }

        .size-btn {
            padding: 10px 6px;
            font-size: 0.7em;
            font-weight: 700;
            border: 1px solid transparent;
            border-radius: var(--tw-r-sm);
            background: var(--tw-overlay-light);
            color: var(--tw-fg-secondary);
            cursor: pointer;
            transition: background var(--tw-dur-base) var(--tw-ease),
                        color var(--tw-dur-base) var(--tw-ease);
        }

        .size-btn:hover {
            background: var(--tw-overlay-medium);
            color: var(--tw-fg);
        }

        .size-btn.active {
            background: var(--tw-ring);
            color: var(--tw-fg);
            border-color: rgba(10, 132, 255, 0.4);
        }

        .size-btn:focus-visible {
            outline: none;
            box-shadow: var(--tw-focus-ring);
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 14px;
        }

        .style-btn {
            padding: 10px 6px;
            font-size: 1em;
            border: 1px solid transparent;
            border-radius: var(--tw-r-sm);
            background: var(--tw-overlay-light);
            cursor: pointer;
            transition: background var(--tw-dur-base) var(--tw-ease),
                        transform var(--tw-dur-fast) var(--tw-ease);
        }

        .style-btn:hover {
            background: var(--tw-overlay-medium);
            transform: scale(1.05);
        }

        .style-btn.active {
            background: var(--tw-ring);
            border-color: rgba(10, 132, 255, 0.4);
        }

        .style-btn:focus-visible {
            outline: none;
            box-shadow: var(--tw-focus-ring);
        }

        .setting-row {
            margin-bottom: 12px;
        }

        .setting-label {
            color: var(--tw-fg-muted);
            font-size: 0.7em;
            margin-bottom: 6px;
            display: block;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .toggle-label {
            color: var(--tw-fg-secondary);
            font-size: 0.7em;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--tw-overlay-medium);
            transition: background-color var(--tw-dur-slow) var(--tw-ease);
            border-radius: var(--tw-r-pill);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--tw-fg);
            transition: transform var(--tw-dur-slow) var(--tw-ease);
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--tw-ring);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(16px);
        }

        .toggle-switch input:focus-visible + .toggle-slider {
            box-shadow: var(--tw-focus-ring);
        }

        .slider-container {
            position: relative;
            height: 24px;
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: var(--tw-overlay-medium);
            border-radius: 2px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--tw-ring);
            cursor: pointer;
            border-radius: 50%;
            border: 1px solid var(--tw-border-strong);
            transition: transform var(--tw-dur-base) var(--tw-ease);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        input[type="range"]:focus-visible {
            box-shadow: var(--tw-focus-ring);
            border-radius: var(--tw-r-pill);
        }

        .slider-value {
            position: absolute;
            right: 0;
            top: -16px;
            font-size: 0.65em;
            color: var(--tw-fg-secondary);
        }

        /* ============================================
           СТИЛЬ: ЦИФРОВОЙ LED (Digital)
           ============================================ */
        .widget-digital {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 5%;
            overflow: hidden;
        }

        .widget-digital.active {
            display: flex;
        }

        /* LED enclosure — dark panel with top highlight */
        .widget-digital-display {
            background: var(--tw-bg-led);
            -webkit-backdrop-filter: var(--tw-blur-sm);
            backdrop-filter: var(--tw-blur-sm);
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-r-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-height: 60%;
            gap: 4px;
            padding: 5% 8%;
            position: relative;
            overflow: hidden;
        }

        .widget-digital-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
            pointer-events: none;
            border-radius: var(--tw-r-md) var(--tw-r-md) 0 0;
        }

        .widget-digital-time {
            font-family: var(--tw-font-mono);
            font-size: var(--digital-font-size, 24px);
            font-weight: 700;
            color: var(--tw-led-green);
            text-shadow:
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 40px color-mix(in srgb, currentColor 40%, transparent);
            letter-spacing: 0.02em;
            white-space: nowrap;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        /* Дата и timezone пропорционально размеру времени в digital */
        .widget-digital-display .date-badge {
            margin-top: 0;
            padding: calc(var(--digital-font-size, 24px) * 0.1) calc(var(--digital-font-size, 24px) * 0.3);
            font-size: calc(var(--digital-font-size, 24px) * 0.18);
            border-radius: calc(var(--digital-font-size, 24px) * 0.1);
        }

        .widget-digital-display .timezone-badge {
            margin-top: 0;
            padding: calc(var(--digital-font-size, 24px) * 0.06) calc(var(--digital-font-size, 24px) * 0.2);
            font-size: calc(var(--digital-font-size, 24px) * 0.14);
            border-radius: calc(var(--digital-font-size, 24px) * 0.08);
        }

        /* ============================================
           СТИЛЬ: ПЕРЕКИДНЫЕ ЧАСЫ (Flip)
           ============================================ */
        .widget-flip {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .widget-flip.active {
            display: flex;
        }

        .widget-flip-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform-origin: center;
            transform: scale(var(--flip-scale, 1));
        }

        .widget-flip-cards {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .widget-flip-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin-top: 6px;
        }

        /* Уменьшенные стили для даты и timezone в flip */
        .widget-flip-info .date-badge {
            margin-top: 0;
            padding: 3px 10px;
            font-size: 10px;
            border-radius: var(--tw-r-xs);
        }

        .widget-flip-info .timezone-badge {
            margin-top: 0;
            padding: 2px 8px;
            font-size: 8px;
            border-radius: var(--tw-r-xs);
        }

        .widget-flip-group {
            display: flex;
            gap: 4px;
        }

        .widget-flip-separator {
            font-family: var(--tw-font-display);
            font-size: 48px;
            font-weight: 600;
            color: var(--tw-fg-muted);
            display: flex;
            align-items: center;
            margin: 0 2px;
            line-height: 1;
        }

        .widget-flip-card {
            position: relative;
            width: 50px;
            height: 70px;
        }

        .widget-flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                rgba(42,42,53,0.85) 0%,
                rgba(26,26,37,0.85) 49.9%,
                rgba(10,10,15,0.90) 50%,
                rgba(21,21,32,0.85) 100%);
            border-radius: var(--tw-r-xs);
            border: 1px solid var(--tw-border);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .widget-flip-inner::before {
            content: '';
            position: absolute;
            top: 49.5%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }

        .widget-flip-digit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--tw-font-display);
            font-size: 42px;
            font-weight: 600;
            color: var(--tw-fg);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        /* Адаптивные размеры для 6 цифр (ЧЧ:ММ:СС) */
        .widget-flip.has-seconds .widget-flip-card {
            width: 40px;
            height: 56px;
        }

        .widget-flip.has-seconds .widget-flip-separator {
            font-size: 36px;
        }

        .widget-flip.has-seconds .widget-flip-digit {
            font-size: 32px;
        }

        /* Скрытие неактивных стилей - все скрыты по умолчанию */
        .circular-widget,
        .widget-digital,
        .widget-flip,
        .widget-analog {
            display: none !important;
        }

        /* Показываем только активный */
        .circular-widget.active { display: flex !important; }
        .widget-digital.active { display: flex !important; }
        .widget-flip.active { display: flex !important; }
        .widget-analog.active { display: flex !important; }

        /* ============================================
           СТИЛЬ: АНАЛОГОВЫЕ ЧАСЫ (Analog)
           ============================================ */
        .widget-analog {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 5%;
            box-sizing: border-box;
            overflow: visible;
        }

        .widget-analog-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-origin: center;
            transform: scale(var(--analog-scale, 1));
        }

        .widget-analog-clock {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--tw-bg-timer);
            -webkit-backdrop-filter: var(--tw-blur-sm);
            backdrop-filter: var(--tw-blur-sm);
            border: 1px solid var(--tw-border-strong);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .widget-analog-clock::before {
            content: '';
            position: absolute;
            inset: 5%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.04), transparent 60%);
            pointer-events: none;
        }

        /* Деления на циферблате */
        .widget-analog-tick {
            position: absolute;
            width: 2px;
            height: 10px;
            background: var(--tw-fg-dim);
            left: 50%;
            top: 12px;
            transform-origin: 50% 88px;
            border-radius: 1px;
            margin-left: -1px;
        }

        .widget-analog-tick.major {
            width: 3px;
            height: 14px;
            background: var(--tw-fg-secondary);
            top: 10px;
            margin-left: -1.5px;
        }

        .widget-analog-tick.quarter {
            width: 4px;
            height: 20px;
            background: var(--tw-ring);
            top: 6px;
            margin-left: -2px;
        }

        /* Скрываем деления когда цифры включены */
        .widget-analog-clock:has(.widget-analog-numbers.visible) .widget-analog-tick {
            display: none;
        }

        /* Цифры на циферблате */
        .widget-analog-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        .widget-analog-numbers.visible {
            display: block;
        }

        .widget-analog-number {
            position: absolute;
            font-family: var(--tw-font-display);
            font-size: 18px;
            font-weight: 500;
            color: var(--tw-fg-secondary);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -50%);
            font-variant-numeric: tabular-nums;
        }

        .widget-analog-number.n12 { top: 12%; left: 50%; }
        .widget-analog-number.n1 { top: 17%; left: 73%; }
        .widget-analog-number.n2 { top: 30%; left: 86%; }
        .widget-analog-number.n3 { top: 50%; left: 90%; }
        .widget-analog-number.n4 { top: 70%; left: 86%; }
        .widget-analog-number.n5 { top: 83%; left: 73%; }
        .widget-analog-number.n6 { top: 88%; left: 50%; }
        .widget-analog-number.n7 { top: 83%; left: 27%; }
        .widget-analog-number.n8 { top: 70%; left: 14%; }
        .widget-analog-number.n9 { top: 50%; left: 10%; }
        .widget-analog-number.n10 { top: 30%; left: 14%; }
        .widget-analog-number.n11 { top: 17%; left: 27%; }

        /* Стрелки */
        .widget-analog-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            border-radius: 3px;
        }

        /* Часовая стрелка */
        .widget-analog-hour {
            width: 5px;
            height: 44px;
            background: linear-gradient(180deg, #ffffff 0%, #cccccc 100%);
            margin-left: -2.5px;
            z-index: 2;
        }

        /* Минутная стрелка */
        .widget-analog-minute {
            width: 3px;
            height: 64px;
            background: linear-gradient(180deg, #ffffff 0%, #dddddd 100%);
            margin-left: -1.5px;
            z-index: 3;
        }

        /* Секундная стрелка */
        .widget-analog-second {
            width: 2px;
            height: 76px;
            background: var(--tw-ring);
            margin-left: -1px;
            z-index: 4;
            transition: transform 0.1s cubic-bezier(0.4, 2.3, 0.3, 1);
        }

        .widget-analog-second::after {
            content: '';
            position: absolute;
            bottom: -15%;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 12px;
            background: linear-gradient(180deg, var(--tw-green), var(--tw-blue));
            border-radius: 1px;
        }

        /* Центральная точка */
        .widget-analog-center {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--tw-ring);
            border-radius: 50%;
            z-index: 5;
        }

        .widget-analog-center::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: var(--tw-fg-secondary);
            border-radius: 50%;
        }

        /* Дата и зона под циферблатом */
        .widget-analog-info {
            margin-top: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .widget-analog-info .date-badge {
            display: none;
            padding: 4px 10px;
            border-radius: var(--tw-r-lg);
            font-size: 12px;
            background: rgba(10, 132, 255, 0.10);
            border: 1px solid rgba(10, 132, 255, 0.30);
            color: var(--tw-fg-secondary);
        }

        .widget-analog-info .timezone-badge {
            display: none;
            padding: 3px 8px;
            border-radius: var(--tw-r-md);
            font-size: 10px;
            background: rgba(10, 132, 255, 0.08);
            border: 1px solid rgba(10, 132, 255, 0.20);
            color: var(--tw-fg-muted);
            font-family: var(--tw-font-mono);
        }

        /* ============================================
           Hint toast — first-run hint
           ============================================ */
        .widget-hint {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: var(--tw-overlay);
            color: var(--tw-fg-secondary);
            font-size: 10px;
            font-family: var(--tw-font-sans);
            padding: 4px 10px;
            border-radius: var(--tw-r-sm);
            opacity: 0;
            animation: hintFade 4s var(--tw-ease) forwards;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid var(--tw-border);
        }
        @keyframes hintFade {
            0% { opacity: 0; }
            15% { opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Focus-visible fallback — tokens-driven ring */
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        [role="button"]:focus-visible,
        [tabindex]:focus-visible {
            outline: none;
            box-shadow: var(--tw-focus-ring);
        }
    </style>
</head>
<body>
    <div class="widget-hint" id="clockHint">Ctrl+колесо — масштаб</div>

    <div class="widget-container" id="widgetContainer">
        <!-- Контролы и настройки убраны — управление из главного окна -->

        <!-- Круговой виджет -->
        <div class="circular-widget active">
            <svg class="widget-svg" viewBox="0 0 200 200">
                <defs>
                    <!-- Градиент для часов -->
                    <linearGradient id="clockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#0a84ff" />
                        <stop offset="100%" stop-color="#30d158" />
                    </linearGradient>
                    <!-- Свечение -->
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Фоновый круг -->
                <circle class="bg-circle" cx="100" cy="100" r="95" />
                
                <!-- Внутреннее свечение -->
                <circle class="inner-glow" cx="100" cy="100" r="70" />

                <!-- Деления (12 шт) -->
                <g class="tick-marks" transform="rotate(-90, 100, 100)">
                    <line x1="100" y1="15" x2="100" y2="22" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(30, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(60, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="22" transform="rotate(90, 100, 100)" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(120, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(150, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="22" transform="rotate(180, 100, 100)" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(210, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(240, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="22" transform="rotate(270, 100, 100)" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(300, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(330, 100, 100)" />
                </g>

                <!-- Трек секунд -->
                <circle class="seconds-track" cx="100" cy="100" r="82" 
                        transform="rotate(-90, 100, 100)" />
                
                <!-- Прогресс секунд -->
                <circle class="seconds-bar" id="secondsBar" cx="100" cy="100" r="82" 
                        transform="rotate(-90, 100, 100)" 
                        stroke-dasharray="515.22" 
                        stroke-dashoffset="515.22" />
            </svg>

            <!-- Центральный контент -->
            <div class="center-content">
                <div class="time-display" id="timeDisplay">00:00</div>
                <div class="date-badge" id="dateBadge" style="display: none;"></div>
                <div class="timezone-badge" id="timezoneBadge"></div>
            </div>
        </div>

        <!-- Стиль: Цифровой LED -->
        <div class="widget-digital" id="widgetDigital">
            <div class="widget-digital-display">
                <div class="widget-digital-time" id="widgetDigitalTime">00:00</div>
                <div class="date-badge" id="digitalDateBadge" style="display: none;"></div>
                <div class="timezone-badge" id="digitalTimezoneBadge"></div>
            </div>
        </div>

        <!-- Стиль: Перекидные часы -->
        <div class="widget-flip" id="widgetFlip">
            <div class="widget-flip-content" id="widgetFlipContent">
                <!-- Карточки времени -->
                <div class="widget-flip-cards">
                    <!-- Группа часов -->
                    <div class="widget-flip-group">
                        <div class="widget-flip-card" id="wFlipHr1">
                            <div class="widget-flip-inner">
                                <span class="widget-flip-digit">0</span>
                            </div>
                        </div>
                        <div class="widget-flip-card" id="wFlipHr2">
                            <div class="widget-flip-inner">
                                <span class="widget-flip-digit">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="widget-flip-separator">:</div>
                    <!-- Группа минут -->
                    <div class="widget-flip-group">
                        <div class="widget-flip-card" id="wFlipMin1">
                            <div class="widget-flip-inner">
                                <span class="widget-flip-digit">0</span>
                            </div>
                        </div>
                        <div class="widget-flip-card" id="wFlipMin2">
                            <div class="widget-flip-inner">
                                <span class="widget-flip-digit">0</span>
                            </div>
                        </div>
                    </div>
                    <!-- Группа секунд (скрываемая) -->
                    <div class="widget-flip-separator widget-flip-seconds-sep" id="wFlipSecSep">:</div>
                    <div class="widget-flip-group widget-flip-seconds-group" id="wFlipSecGroup">
                        <div class="widget-flip-card" id="wFlipSec1">
                            <div class="widget-flip-inner">
                                <span class="widget-flip-digit">0</span>
                            </div>
                        </div>
                        <div class="widget-flip-card" id="wFlipSec2">
                            <div class="widget-flip-inner">
                                <span class="widget-flip-digit">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Дата и часовой пояс -->
                <div class="widget-flip-info" id="widgetFlipInfo">
                    <div class="date-badge" id="flipDateBadge" style="display: none;"></div>
                    <div class="timezone-badge" id="flipTimezoneBadge"></div>
                </div>
            </div>
        </div>

        <!-- Стиль: Аналоговые часы -->
        <div class="widget-analog" id="widgetAnalog">
            <div class="widget-analog-content">
                <div class="widget-analog-clock">
                    <!-- Деления -->
                    <div class="widget-analog-tick quarter" style="transform: rotate(0deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(30deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(60deg);"></div>
                <div class="widget-analog-tick quarter" style="transform: rotate(90deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(120deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(150deg);"></div>
                <div class="widget-analog-tick quarter" style="transform: rotate(180deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(210deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(240deg);"></div>
                <div class="widget-analog-tick quarter" style="transform: rotate(270deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(300deg);"></div>
                <div class="widget-analog-tick" style="transform: rotate(330deg);"></div>
                
                <!-- Цифры (скрыты по умолчанию) -->
                <div class="widget-analog-numbers" id="clockAnalogNumbers">
                    <span class="widget-analog-number n12">12</span>
                    <span class="widget-analog-number n1">1</span>
                    <span class="widget-analog-number n2">2</span>
                    <span class="widget-analog-number n3">3</span>
                    <span class="widget-analog-number n4">4</span>
                    <span class="widget-analog-number n5">5</span>
                    <span class="widget-analog-number n6">6</span>
                    <span class="widget-analog-number n7">7</span>
                    <span class="widget-analog-number n8">8</span>
                    <span class="widget-analog-number n9">9</span>
                    <span class="widget-analog-number n10">10</span>
                    <span class="widget-analog-number n11">11</span>
                </div>
                
                <!-- Стрелки -->
                <div class="widget-analog-hand widget-analog-hour" id="clockAnalogHour"></div>
                <div class="widget-analog-hand widget-analog-minute" id="clockAnalogMinute"></div>
                <div class="widget-analog-hand widget-analog-second" id="clockAnalogSecond"></div>
                
                <!-- Центр -->
                <div class="widget-analog-center"></div>
            </div>
            
            <!-- Дата и часовой пояс -->
            <div class="widget-analog-info" id="widgetAnalogInfo">
                <div class="date-badge" id="analogDateBadge"></div>
                <div class="timezone-badge" id="analogTimezoneBadge"></div>
            </div>
            </div><!-- закрытие widget-analog-content -->
        </div>
    </div>

    <!-- IPC Compatibility Layer (maps ipcRenderer to secure electronAPI) -->
    <script src="ipc-compat.js"></script>
    <script src="constants.js"></script>
    <script src="security.js"></script>
    <script src="utils.js"></script>

    <script>
        // ipcRenderer теперь доступен через ipc-compat.js (безопасно)

        class ClockWidget {
            constructor() {
                this.radius = 82;
                this.circumference = 2 * Math.PI * this.radius;

                // Настройки
                this.showSeconds = true;
                this.format24h = true;
                this.showDate = false;
                this.showTimezone = false;  // Убрано из UI — всегда выключено
                this.showNumbers = false;
                this.clockStyle = 'circle';
                // Stored handler refs for cleanup
                this._handlers = {};

                this.initElements();
                this.initProgress();
                this.loadSettings();
                this.setupEventListeners();
                this.setupSettings();
                this.setupIPC();
                this.startClock();
            }

            initElements() {
                this.container = document.getElementById('widgetContainer');
                this.timeDisplay = document.getElementById('timeDisplay');
                this.dateBadge = document.getElementById('dateBadge');
                this.timezoneBadge = document.getElementById('timezoneBadge');
                this.secondsBar = document.getElementById('secondsBar');
                // Контролы убраны — управление из главного окна через IPC
                // Элементы удалены из HTML, ставим null чтобы избежать крэшей
                this.showSecondsEl = null;
                this.format24hEl = null;
                this.showDateEl = null;
                this.showTimezoneEl = null;
                this.showNumbersEl = null;
                this.showNumbersRow = null;
                
                // Дополнительные элементы для стилей
                this.digitalDateBadge = document.getElementById('digitalDateBadge');
                this.digitalTimezoneBadge = document.getElementById('digitalTimezoneBadge');
                this.flipDateBadge = document.getElementById('flipDateBadge');
                this.flipTimezoneBadge = document.getElementById('flipTimezoneBadge');
                
                // Элементы для разных стилей
                this.circularWidget = document.querySelector('.circular-widget');
                this.widgetDigital = document.getElementById('widgetDigital');
                this.widgetFlip = document.getElementById('widgetFlip');
                this.widgetDigitalTime = document.getElementById('widgetDigitalTime');
                this.widgetFlipContent = document.getElementById('widgetFlipContent');
                
                // Flip карточки
                this.wFlipHr1 = document.getElementById('wFlipHr1');
                this.wFlipHr2 = document.getElementById('wFlipHr2');
                this.wFlipMin1 = document.getElementById('wFlipMin1');
                this.wFlipMin2 = document.getElementById('wFlipMin2');
                this.wFlipSec1 = document.getElementById('wFlipSec1');
                this.wFlipSec2 = document.getElementById('wFlipSec2');
                this.wFlipSecGroup = document.getElementById('wFlipSecGroup');
                this.wFlipSecSep = document.getElementById('wFlipSecSep');
                
                // Аналоговые часы
                this.widgetAnalog = document.getElementById('widgetAnalog');
                this.clockAnalogHour = document.getElementById('clockAnalogHour');
                this.clockAnalogMinute = document.getElementById('clockAnalogMinute');
                this.clockAnalogSecond = document.getElementById('clockAnalogSecond');
                this.clockAnalogNumbers = document.getElementById('clockAnalogNumbers');
                this.analogDateBadge = document.getElementById('analogDateBadge');
                this.analogTimezoneBadge = document.getElementById('analogTimezoneBadge');
                
                // Устанавливаем стиль по умолчанию
                if (this.circularWidget) this.circularWidget.classList.add('active');
                document.body.classList.add('style-circle');
                
                // Настраиваем масштабирование для digital и flip
                this.updateScaling();
                this._handlers.onResizeScaling = () => this.updateScaling();
                window.addEventListener('resize', this._handlers.onResizeScaling);
            }

            updateScaling() {
                const containerWidth = this.container.offsetWidth;
                const containerHeight = this.container.offsetHeight;
                
                // Размер шрифта для digital - подбираем чтобы текст вместился
                // Для времени HH:MM:SS нужно ~8 символов, для HH:MM - ~5
                const showSeconds = this.showSeconds;
                const charCount = showSeconds ? 8 : 5;
                // Ширина символа примерно 0.6 от размера шрифта для моноширинного
                const maxFontByWidth = (containerWidth * 0.85) / (charCount * 0.6);
                const maxFontByHeight = containerHeight * 0.7;
                const digitalFontSize = Math.min(maxFontByWidth, maxFontByHeight);
                this.container.style.setProperty('--digital-font-size', digitalFontSize + 'px');
                
                // Масштаб для flip:
                // С секундами (HH:MM:SS): 6 карт×40 + 2×4 gap + 2 сеп×~20 + 4×8 flex gap ≈ 320
                // Без секунд (HH:MM): 4 карт×50 + 1×4 gap + 1 сеп×~25 + 2×8 flex gap ≈ 253
                const baseFlipWidth = showSeconds ? 320 : 255;
                const hasExtraInfo = this.showDate || this.showTimezone;
                // Карточки: 56px (с секундами) или 70px (без), плюс ~35px на дату/timezone
                const baseCardHeight = showSeconds ? 56 : 70;
                const baseFlipHeight = hasExtraInfo ? baseCardHeight + 35 : baseCardHeight;
                
                const scaleX = (containerWidth * 0.95) / baseFlipWidth;
                const scaleY = (containerHeight * 0.95) / baseFlipHeight;
                const flipScale = Math.min(scaleX, scaleY);
                
                this.container.style.setProperty('--flip-scale', flipScale);
                
                // Масштаб для аналоговых часов (базовый размер 200px + ~50px для info)
                const hasAnalogInfo = this.showDate || this.showTimezone;
                const baseAnalogWidth = 200;
                const baseAnalogHeight = hasAnalogInfo ? 250 : 200;
                
                const analogScaleX = (containerWidth * 0.8) / baseAnalogWidth;
                const analogScaleY = (containerHeight * 0.8) / baseAnalogHeight;
                const analogScale = Math.min(analogScaleX, analogScaleY);
                
                this.container.style.setProperty('--analog-scale', analogScale);
            }

            initProgress() {
                this.secondsBar.style.strokeDasharray = `${this.circumference}`;
                this.secondsBar.style.strokeDashoffset = this.circumference;
            }

            applyColors(colors = null) {
                if (!colors) {
                    const saved = localStorage.getItem('clockColors');
                    colors = saved ? JSON.parse(saved) : null;
                }
                if (!colors) { return; }

                const isSafeColor = (v) => typeof v === 'string' && /^#[0-9a-fA-F]{3,8}$|^rgba?\([\d,.\s%]+\)$/.test(v);
                const timerColor = isSafeColor(colors.timer) ? colors.timer : null;
                const progressColor = isSafeColor(colors.progress) ? colors.progress : null;

                // Circle style
                if (timerColor && this.timeDisplay) {
                    this.timeDisplay.style.color = timerColor;
                }
                if (progressColor && this.secondsBar) {
                    this.secondsBar.style.stroke = progressColor;
                }
                // Update SVG gradient stops
                const gradStops = document.querySelectorAll('#clockGradient stop');
                if (gradStops.length >= 2) {
                    if (timerColor) { gradStops[0].setAttribute('stop-color', timerColor); }
                    if (progressColor) { gradStops[1].setAttribute('stop-color', progressColor); }
                }

                // Digital style
                if (timerColor && this.widgetDigitalTime) {
                    this.widgetDigitalTime.style.color = timerColor;
                    this.widgetDigitalTime.style.textShadow =
                        `0 0 10px ${timerColor}, 0 0 20px ${timerColor}, 0 0 40px ${timerColor}66`;
                }

                // Flip style
                if (timerColor) {
                    document.querySelectorAll('.widget-flip-digit').forEach(el => {
                        el.style.color = timerColor;
                    });
                    document.querySelectorAll('.widget-flip-separator').forEach(el => {
                        el.style.color = timerColor;
                    });
                }

                // Analog style
                if (progressColor && this.clockAnalogSecond) {
                    this.clockAnalogSecond.style.background =
                        `linear-gradient(180deg, ${timerColor || progressColor} 0%, ${progressColor} 100%)`;
                    this.clockAnalogSecond.style.boxShadow = '';
                }
                if (timerColor) {
                    const center = document.querySelector('.widget-analog-center');
                    if (center) { center.style.background = timerColor; }
                }

                // Date & timezone badges — all styles
                if (timerColor) {
                    [this.dateBadge, this.digitalDateBadge, this.flipDateBadge, this.analogDateBadge].forEach(el => {
                        if (el) { el.style.color = timerColor; }
                    });
                    [this.timezoneBadge, this.digitalTimezoneBadge, this.flipTimezoneBadge, this.analogTimezoneBadge].forEach(el => {
                        if (el) { el.style.color = timerColor; }
                    });
                }

                localStorage.setItem('clockColors', JSON.stringify(colors));
            }

            setupEventListeners() {
                // JS-based window drag (replaces -webkit-app-region: drag)
                let isDragging = false;
                let dragStartX = 0, dragStartY = 0;

                this._handlers.onContainerMouseDown = (e) => {
                    isDragging = true;
                    dragStartX = e.screenX;
                    dragStartY = e.screenY;
                    e.preventDefault();
                };
                this.container.addEventListener('mousedown', this._handlers.onContainerMouseDown);

                this._handlers.onMouseMove = (e) => {
                    if (!isDragging) { return; }
                    const dx = e.screenX - dragStartX;
                    const dy = e.screenY - dragStartY;
                    if (dx !== 0 || dy !== 0) {
                        ipcRenderer.send('clock-widget-move', { deltaX: dx, deltaY: dy });
                        dragStartX = e.screenX;
                        dragStartY = e.screenY;
                    }
                };
                document.addEventListener('mousemove', this._handlers.onMouseMove);

                this._handlers.onMouseUp = () => {
                    isDragging = false;
                };
                document.addEventListener('mouseup', this._handlers.onMouseUp);

                // Track timer and window states for keyboard shortcuts
                let _timerIsRunning = false;
                let _displayIsOpen = false;
                let _widgetIsOpen = false;
                this._handlers.onTimerState = (_event, state) => {
                    _timerIsRunning = !!state.isRunning;
                };
                this._handlers.onDisplayWindowState = (_event, state) => {
                    _displayIsOpen = !!state.isOpen;
                };
                this._handlers.onWidgetWindowState = (_event, state) => {
                    _widgetIsOpen = !!state.isOpen;
                };
                ipcRenderer.on('timer-state', this._handlers.onTimerState);
                ipcRenderer.on('display-window-state', this._handlers.onDisplayWindowState);
                ipcRenderer.on('widget-window-state', this._handlers.onWidgetWindowState);

                // Keyboard shortcuts (Space, R, Escape, C, W, D)
                this._handlers.onKeyDown = (e) => {
                    if (e.ctrlKey || e.altKey || e.metaKey) { return; }
                    switch (e.code) {
                        case 'Space':
                            e.preventDefault();
                            if (_timerIsRunning) {
                                ipcRenderer.send('timer-control', 'pause');
                            } else {
                                ipcRenderer.send('timer-control', 'start');
                            }
                            break;
                        case 'KeyR':
                            e.preventDefault();
                            ipcRenderer.send('timer-control', 'reset');
                            break;
                        case 'Escape':
                        case 'KeyC':
                            e.preventDefault();
                            ipcRenderer.send('close-clock-widget');
                            break;
                        case 'KeyW':
                            e.preventDefault();
                            ipcRenderer.send(_widgetIsOpen ? 'close-widget' : 'open-widget');
                            break;
                        case 'KeyD':
                            e.preventDefault();
                            ipcRenderer.send(_displayIsOpen ? 'close-display' : 'open-display');
                            break;
                    }

                    // 1-8: Quick timer presets (5, 10, 15, 20, 25, 30, 45, 60 minutes)
                    if (e.code >= 'Digit1' && e.code <= 'Digit8') {
                        e.preventDefault();
                        const presets = [300, 600, 900, 1200, 1500, 1800, 2700, 3600];
                        const idx = parseInt(e.code.replace('Digit', '')) - 1;
                        ipcRenderer.send('timer-command', { type: 'set', seconds: presets[idx] });
                    }
                };
                document.addEventListener('keydown', this._handlers.onKeyDown);

                // Ctrl+Wheel scaling — resize clock by 10% per scroll tick
                const CLOCK_BASE_SIZE = 220;
                const CLOCK_MIN_SCALE = 30;
                const CLOCK_MAX_SCALE = 600;
                let clockScalePct = Math.round(window.outerWidth / CLOCK_BASE_SIZE * 100);
                this._handlers.onWheel = (e) => {
                    if (!e.ctrlKey) { return; }
                    e.preventDefault();
                    const step = 10;
                    const delta = e.deltaY < 0 ? step : -step;
                    const newPct = Math.max(CLOCK_MIN_SCALE, Math.min(CLOCK_MAX_SCALE, clockScalePct + delta));
                    if (newPct === clockScalePct) { return; }
                    clockScalePct = newPct;
                    const newSize = Math.round(CLOCK_BASE_SIZE * newPct / 100);
                    ipcRenderer.send('clock-widget-resize', { width: newSize, height: newSize });
                };
                document.addEventListener('wheel', this._handlers.onWheel, { passive: false });
                this._handlers.onResizeScalePct = () => {
                    clockScalePct = Math.round(window.outerWidth / CLOCK_BASE_SIZE * 100);
                };
                window.addEventListener('resize', this._handlers.onResizeScalePct);
            }

            setupSettings() {
                // Все настройки управляются из главного окна через IPC
                // Ctrl+Wheel resize сохранён в setupEventListeners
            }

            setSize(size) {
                const sizes = {
                    small: { width: 180, height: 180 },
                    medium: { width: 250, height: 250 },
                    large: { width: 350, height: 350 },
                    xlarge: { width: 500, height: 500 }
                };

                const s = sizes[size];
                if (s) {
                    ipcRenderer.send('clock-widget-resize', s);
                    localStorage.setItem('clockWidgetSize', size);
                }
            }

            setClockStyle(style) {
                this.clockStyle = style;
                
                // Применяем класс стиля к body
                document.body.classList.remove('style-circle', 'style-digital', 'style-flip', 'style-analog');
                document.body.classList.add('style-' + style);
                
                // Скрываем все стили
                if (this.circularWidget) this.circularWidget.classList.remove('active');
                if (this.widgetDigital) this.widgetDigital.classList.remove('active');
                if (this.widgetFlip) this.widgetFlip.classList.remove('active');
                if (this.widgetAnalog) this.widgetAnalog.classList.remove('active');
                
                // Показываем выбранный
                switch (style) {
                    case 'circle':
                        if (this.circularWidget) this.circularWidget.classList.add('active');
                        break;
                    case 'digital':
                        if (this.widgetDigital) this.widgetDigital.classList.add('active');
                        break;
                    case 'flip':
                        if (this.widgetFlip) this.widgetFlip.classList.add('active');
                        break;
                    case 'analog':
                        if (this.widgetAnalog) this.widgetAnalog.classList.add('active');
                        break;
                }
                
                // Показываем/скрываем опцию "Цифры на циферблате" только для analog
                if (this.showNumbersRow) {
                    this.showNumbersRow.style.display = (style === 'analog') ? 'flex' : 'none';
                }

                // Принудительные форматы по стилю:
                // Все стили: секунды включены, цифровой/перекидные: 24ч формат
                this.showSeconds = true;
                if (style === 'digital' || style === 'flip') {
                    this.format24h = true;
                }
                this.updateSecondsVisibility();

                // Обновляем масштабирование после смены стиля
                if (this._scalingTimer) { clearTimeout(this._scalingTimer); }
                this._scalingTimer = setTimeout(() => {
                    this._scalingTimer = null;
                    this.updateScaling();
                }, 50);

                this.saveSettings();
                this.updateDisplay();
            }

            formatTimezoneString() {
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const offset = new Date().getTimezoneOffset();
                const sign = offset <= 0 ? '+' : '-';
                const absOffset = Math.abs(offset);
                const hours = Math.floor(absOffset / 60);
                const mins = absOffset % 60;
                return `UTC${sign}${hours}${mins > 0 ? ':' + String(mins).padStart(2, '0') : ''} • ${tz.split('/').pop().replace('_', ' ')}`;
            }

            updateDateTimezoneVisibility() {
                // Обновляем видимость даты во всех стилях
                [this.dateBadge, this.digitalDateBadge, this.flipDateBadge, this.analogDateBadge].forEach(el => {
                    if (el) {
                        el.style.display = this.showDate ? 'block' : 'none';
                    }
                });
                
                // Обновляем видимость часового пояса во всех стилях
                const tzString = this.formatTimezoneString();
                
                [this.timezoneBadge, this.digitalTimezoneBadge, this.flipTimezoneBadge, this.analogTimezoneBadge].forEach(el => {
                    if (el) {
                        el.textContent = tzString;
                        el.style.display = this.showTimezone ? 'block' : 'none';
                    }
                });
                
                // Пересчитываем масштаб
                this.updateScaling();
            }

            updateSecondsVisibility() {
                // Для flip-часов
                if (this.wFlipSecGroup && this.wFlipSecSep) {
                    this.wFlipSecGroup.style.display = this.showSeconds ? 'flex' : 'none';
                    this.wFlipSecSep.style.display = this.showSeconds ? 'flex' : 'none';
                    this.widgetFlip.classList.toggle('has-seconds', this.showSeconds);
                }
                
                // Обновляем масштаб при изменении количества цифр
                if (this._scalingTimer) { clearTimeout(this._scalingTimer); }
                this._scalingTimer = setTimeout(() => {
                    this._scalingTimer = null;
                    this.updateScaling();
                }, 50);
            }

            // toggleSettings и closeSettings убраны — управление из главного окна

            loadSettings() {
                const settings = localStorage.getItem('clockWidgetSettings');
                if (settings) {
                    const s = window.SecurityUtils.safeJSONParse(settings, {});
                    if (s.opacity !== undefined) {
                        this.container.style.opacity = s.opacity;
                    }
                    if (s.showSeconds !== undefined) {
                        this.showSeconds = s.showSeconds;
                    }
                    if (s.format24h !== undefined) {
                        this.format24h = s.format24h;
                    }
                    if (s.showDate !== undefined) {
                        this.showDate = s.showDate;
                    }
                    if (s.showTimezone !== undefined) {
                        this.showTimezone = s.showTimezone;
                    }
                    if (s.showNumbers !== undefined) {
                        this.showNumbers = s.showNumbers;
                        if (this.clockAnalogNumbers) {
                            this.clockAnalogNumbers.classList.toggle('visible', s.showNumbers);
                        }
                    }
                    if (s.clockStyle) {
                        this.clockStyle = s.clockStyle;
                        this.setClockStyle(s.clockStyle);
                    }
                }

                // Размер
                const savedSize = localStorage.getItem('clockWidgetSize') || 'medium';
                this.setSize(savedSize);
                
                // Обновляем видимость элементов
                this.updateSecondsVisibility();
                this.updateDateTimezoneVisibility();
                this.updateScaling();
            }

            saveSettings() {
                const settings = {
                    opacity: parseFloat(this.container.style.opacity) || 1,
                    showSeconds: this.showSeconds,
                    format24h: this.format24h,
                    showDate: this.showDate,
                    showTimezone: this.showTimezone,
                    showNumbers: this.showNumbers,
                    clockStyle: this.clockStyle
                };
                localStorage.setItem('clockWidgetSettings', JSON.stringify(settings));
            }

            setupIPC() {
                // Получаем стиль от панели управления
                this._onSetClockStyle = (event, style) => {
                    this.setClockStyle(style);
                    // Обновляем UI кнопок стиля
                    document.querySelectorAll('.style-btn').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.style === style);
                    });
                };
                ipcRenderer.on('set-clock-style', this._onSetClockStyle);
                
                // Получаем настройки дисплея (showAnalogNumbers)
                this._onDisplaySettingsUpdate = (event, settings) => {
                    if (settings.showAnalogNumbers !== undefined && this.clockAnalogNumbers) {
                        this.clockAnalogNumbers.classList.toggle('visible', settings.showAnalogNumbers);
                    }
                    if (settings.clockStyle) {
                        this.setClockStyle(settings.clockStyle);
                    } else if (settings.timerStyle) {
                        this.setClockStyle(settings.timerStyle);
                    }
                };
                ipcRenderer.on('display-settings-update', this._onDisplaySettingsUpdate);
                
                // Получаем настройки часов от панели управления
                this._onClockSettings = (event, settings) => {
                    if (settings.showDate !== undefined) {
                        this.showDate = settings.showDate;
                        if (this.showDateEl) { this.showDateEl.checked = settings.showDate; }
                    }
                    if (settings.showTimezone !== undefined) {
                        this.showTimezone = settings.showTimezone;
                        if (this.showTimezoneEl) { this.showTimezoneEl.checked = settings.showTimezone; }
                    }
                    if (settings.showSeconds !== undefined) {
                        this.showSeconds = settings.showSeconds;
                        if (this.showSecondsEl) { this.showSecondsEl.checked = settings.showSeconds; }
                        this.updateSecondsVisibility();
                    }
                    if (settings.format24h !== undefined) {
                        this.format24h = settings.format24h;
                        if (this.format24hEl) { this.format24hEl.checked = settings.format24h; }
                    }
                    if (settings.showNumbers !== undefined) {
                        this.showNumbers = settings.showNumbers;
                        if (this.showNumbersEl) { this.showNumbersEl.checked = settings.showNumbers; }
                        if (this.clockAnalogNumbers) {
                            this.clockAnalogNumbers.classList.toggle('visible', settings.showNumbers);
                        }
                    }
                    this.updateDateTimezoneVisibility();
                    this.saveSettings();
                    this.updateDisplay();
                };
                ipcRenderer.on('clock-settings', this._onClockSettings);

                // Per-window color theme (+ backward compat with global colors-update)
                this._onColorsUpdate = (_event, colors) => {
                    this.applyColors(colors);
                };
                ipcRenderer.on('colors-update', this._onColorsUpdate);
                ipcRenderer.on('clock-colors-update', this._onColorsUpdate);
            }

            cleanup() {
                if (this.clockTimeout) {
                    clearTimeout(this.clockTimeout);
                    this.clockTimeout = null;
                }
                if (this.mouseTimeout) {
                    clearTimeout(this.mouseTimeout);
                    this.mouseTimeout = null;
                }
                if (this._scalingTimer) {
                    clearTimeout(this._scalingTimer);
                    this._scalingTimer = null;
                }
                if (this._onSetClockStyle) ipcRenderer.removeListener('set-clock-style', this._onSetClockStyle);
                if (this._onDisplaySettingsUpdate) ipcRenderer.removeListener('display-settings-update', this._onDisplaySettingsUpdate);
                if (this._onClockSettings) ipcRenderer.removeListener('clock-settings', this._onClockSettings);
                if (this._onColorsUpdate) {
                    ipcRenderer.removeListener('colors-update', this._onColorsUpdate);
                    ipcRenderer.removeListener('clock-colors-update', this._onColorsUpdate);
                }

                // Удаляем DOM и IPC handlers из _handlers
                const h = this._handlers || {};
                if (h.onResizeScaling) { window.removeEventListener('resize', h.onResizeScaling); }
                if (h.onResizeScalePct) { window.removeEventListener('resize', h.onResizeScalePct); }
                if (h.onMouseMove) { document.removeEventListener('mousemove', h.onMouseMove); }
                if (h.onMouseUp) { document.removeEventListener('mouseup', h.onMouseUp); }
                if (h.onKeyDown) { document.removeEventListener('keydown', h.onKeyDown); }
                if (h.onWheel) { document.removeEventListener('wheel', h.onWheel); }
                if (h.onContainerMouseDown && this.container) {
                    this.container.removeEventListener('mousedown', h.onContainerMouseDown);
                }
                if (h.onTimerState) { ipcRenderer.removeListener('timer-state', h.onTimerState); }
                if (h.onDisplayWindowState) { ipcRenderer.removeListener('display-window-state', h.onDisplayWindowState); }
                if (h.onWidgetWindowState) { ipcRenderer.removeListener('widget-window-state', h.onWidgetWindowState); }
                this._handlers = {};
            }

            startClock() {
                // Очищаем предыдущий таймер если был
                if (this.clockTimeout) {
                    clearTimeout(this.clockTimeout);
                    this.clockTimeout = null;
                }
                this.updateDisplay();
                // Самокорректирующийся таймер, синхронизированный с системными часами
                this._scheduleNextTick();
            }

            _scheduleNextTick() {
                const now = Date.now();
                const msToNextSecond = 1000 - (now % 1000);
                this.clockTimeout = setTimeout(() => {
                    this.updateDisplay();
                    this._scheduleNextTick();
                }, msToNextSecond);
            }

            updateDisplay() {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                // Форматируем время
                let displayHours = hours;
                let ampm = '';
                
                if (!this.format24h) {
                    ampm = hours >= 12 ? ' PM' : ' AM';
                    displayHours = hours % 12 || 12;
                }

                const timeStr = this.showSeconds 
                    ? `${String(displayHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}${ampm}`
                    : `${String(displayHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}${ampm}`;

                // Обновляем круговой стиль
                this.timeDisplay.textContent = timeStr;

                // Обновляем прогресс секунд
                const ratio = seconds / 60;
                const offset = this.circumference - (ratio * this.circumference);
                this.secondsBar.style.strokeDashoffset = offset;

                // Обновляем цифровой стиль
                if (this.widgetDigitalTime) {
                    this.widgetDigitalTime.textContent = timeStr;
                }

                // Обновляем перекидные часы
                this.updateFlipDisplay(displayHours, minutes, seconds);

                // Обновляем аналоговые часы
                this.updateAnalogClock(hours, minutes, seconds);

                // Обновляем дату во всех стилях
                if (this.showDate) {
                    const options = { weekday: 'short', day: 'numeric', month: 'short' };
                    const dateStr = now.toLocaleDateString('ru-RU', options);
                    [this.dateBadge, this.digitalDateBadge, this.flipDateBadge, this.analogDateBadge].forEach(el => {
                        if (el) el.textContent = dateStr;
                    });
                }
                
                // Обновляем часовой пояс во всех стилях
                if (this.showTimezone) {
                    const tzStr = this.formatTimezoneString();
                    [this.timezoneBadge, this.digitalTimezoneBadge, this.flipTimezoneBadge, this.analogTimezoneBadge].forEach(el => {
                        if (el) el.textContent = tzStr;
                    });
                }
            }

            updateAnalogClock(hours, minutes, seconds) {
                if (!this.clockAnalogHour || !this.clockAnalogMinute || !this.clockAnalogSecond) return;

                // Часовая стрелка - полный оборот за 12 часов
                // Плавное движение с учетом минут
                const hourDeg = ((hours % 12) / 12) * 360 + (minutes / 60) * 30;
                this.clockAnalogHour.style.transform = `rotate(${hourDeg}deg)`;

                // Минутная стрелка - полный оборот за 60 минут
                // Плавное движение с учетом секунд
                const minuteDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
                this.clockAnalogMinute.style.transform = `rotate(${minuteDeg}deg)`;

                // Секундная стрелка - полный оборот за 60 секунд
                const secondDeg = (seconds / 60) * 360;
                // Отключаем transition при переходе 59→0 чтобы не было обратного оборота
                if (seconds === 0) {
                    this.clockAnalogSecond.style.transition = 'none';
                } else if (this.clockAnalogSecond.style.transition === 'none') {
                    this.clockAnalogSecond.style.transition = '';
                }
                this.clockAnalogSecond.style.transform = `rotate(${secondDeg}deg)`;
                
                // Скрываем/показываем секундную стрелку
                if (this.clockAnalogSecond) {
                    this.clockAnalogSecond.style.display = this.showSeconds ? 'block' : 'none';
                }
            }

            updateFlipDisplay(hours, minutes, seconds) {
                if (!this.wFlipHr1 || !this.wFlipMin1) return;

                const hr1 = String(Math.floor(hours / 10) % 10);
                const hr2 = String(hours % 10);
                const min1 = String(Math.floor(minutes / 10));
                const min2 = String(minutes % 10);
                const sec1 = String(Math.floor(seconds / 10));
                const sec2 = String(seconds % 10);

                // Обновляем цифры
                this.wFlipHr1.querySelector('.widget-flip-digit').textContent = hr1;
                this.wFlipHr2.querySelector('.widget-flip-digit').textContent = hr2;
                this.wFlipMin1.querySelector('.widget-flip-digit').textContent = min1;
                this.wFlipMin2.querySelector('.widget-flip-digit').textContent = min2;
                
                if (this.showSeconds && this.wFlipSec1 && this.wFlipSec2) {
                    this.wFlipSec1.querySelector('.widget-flip-digit').textContent = sec1;
                    this.wFlipSec2.querySelector('.widget-flip-digit').textContent = sec2;
                }
            }
        }

        // Show hint only on first open
        if (localStorage.getItem('clockHintShown') === 'v2') {
            const h = document.getElementById('clockHint');
            if (h) { h.style.display = 'none'; }
        } else {
            localStorage.setItem('clockHintShown', 'v2');
        }

        const clockWidget = new ClockWidget();

        // Cleanup при закрытии окна
        window.addEventListener('beforeunload', () => {
            clockWidget.cleanup();
        });
    </script>
</body>
</html>
