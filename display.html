        /* ============================================================
           Fullscreen Display — VisionOS glassmorphism v2
           Uses design-tokens.css. Hex only in SVG stops + LED glow.
           ============================================================ */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 100%; height: 100%; overflow: hidden; }

        body {
            font-family: var(--tw-font-sans);
            color: var(--tw-fg);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Default background = kit gradient. --bg var is set by applyBackground() for user themes. */
            background: var(--bg, linear-gradient(135deg, #1a1b3a 0%, #0d1117 45%, #000 100%));
            transition: background var(--tw-dur-slow) var(--tw-ease);
            background-size: cover;
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* Soft radial glow layers — blue + green, the brand gesture.
           Only present when --bg was NOT overridden with a user image/solid.
           We use ::before regardless; it sits above bg and under content. */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(10, 132, 255, 0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 70%, rgba(48, 209, 88, 0.14) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(88, 86, 214, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .display-container {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            padding: var(--tw-s-10);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ============================================================
           INFO BLOCKS — Alt-draggable, per-block localStorage positions
           ============================================================ */
        .info-block {
            --info-scale: 1.2;
            position: fixed;
            text-align: center;
            opacity: 0;
            transform: scale(calc(0.9 * var(--info-scale)));
            transition: opacity var(--tw-dur-slow) var(--tw-ease),
                        transform var(--tw-dur-slow) var(--tw-ease);
            z-index: 100;
            padding: 16px 26px;
            background: var(--tw-bg-surface);
            -webkit-backdrop-filter: var(--tw-blur-sm);
            backdrop-filter: var(--tw-blur-sm);
            border: 1px solid var(--tw-border-strong);
            border-radius: var(--tw-r-xl);
            max-width: calc(33vw - 40px);
        }

        .info-block.visible {
            opacity: 1;
            transform: scale(var(--info-scale));
        }

        /* Preset positions — transform-origin anchors corner/edge scaling */
        .info-block.top-left    { top: 20px; left: 20px;   transform-origin: top left; }
        .info-block.top-center  { top: 20px; left: 50%;    transform-origin: top center;
                                   transform: translateX(-50%) scale(calc(0.9 * var(--info-scale))); }
        .info-block.top-center.visible { transform: translateX(-50%) scale(var(--info-scale)); }
        .info-block.top-right   { top: 20px; right: 20px;  transform-origin: top right; }
        .info-block.bottom-left  { bottom: 100px; left: 20px;  transform-origin: bottom left; }
        .info-block.bottom-center { bottom: 100px; left: 50%;  transform-origin: bottom center;
                                     transform: translateX(-50%) scale(calc(0.9 * var(--info-scale))); }
        .info-block.bottom-center.visible { transform: translateX(-50%) scale(var(--info-scale)); }
        .info-block.bottom-right { bottom: 100px; right: 20px; transform-origin: bottom right; }

        .info-block.top-left-third { top: 20px; left: 20%; transform-origin: top left;
                                      transform: translateX(-50%) scale(calc(0.9 * var(--info-scale))); }
        .info-block.top-left-third.visible { transform: translateX(-50%) scale(var(--info-scale)); }
        .info-block.top-right-third { top: 20px; right: 20%; transform-origin: top right;
                                       transform: translateX(50%) scale(calc(0.9 * var(--info-scale))); }
        .info-block.top-right-third.visible { transform: translateX(50%) scale(var(--info-scale)); }
        .info-block.bottom-left-third { bottom: 100px; left: 20%; transform-origin: bottom left;
                                         transform: translateX(-50%) scale(calc(0.9 * var(--info-scale))); }
        .info-block.bottom-left-third.visible { transform: translateX(-50%) scale(var(--info-scale)); }
        .info-block.bottom-right-third { bottom: 100px; right: 20%; transform-origin: bottom right;
                                          transform: translateX(50%) scale(calc(0.9 * var(--info-scale))); }
        .info-block.bottom-right-third.visible { transform: translateX(50%) scale(var(--info-scale)); }

        .info-label {
            font-family: var(--tw-font-sans);
            font-size: var(--tw-t-caption);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--info-color-dim, var(--tw-fg-dim));
            margin-bottom: 10px;
            transition: color var(--tw-dur-base) var(--tw-ease);
        }

        .info-value {
            font-size: clamp(1.2rem, 2.5vw, 2.2rem);
            font-weight: 500;
            font-family: var(--tw-font-sans);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.3px;
            color: var(--info-color, var(--tw-fg));
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
            white-space: nowrap;
            transition: color var(--tw-dur-base) var(--tw-ease),
                        text-shadow var(--tw-dur-base) var(--tw-ease);
        }

        /* ===== Per-style overrides for info-blocks ===== */

        /* LED style */
        body.style-digital .info-block {
            background: var(--tw-bg-led);
            border: 1px solid var(--tw-border-strong);
            border-radius: var(--tw-r-lg);
            box-shadow:
                inset 0 0 20px rgba(0, 0, 0, 0.6),
                0 4px 20px rgba(0, 0, 0, 0.4),
                0 0 30px var(--info-glow, rgba(48, 209, 88, 0.15));
        }
        body.style-digital .info-label {
            color: var(--info-color-dim, rgba(48, 209, 88, 0.55));
            text-shadow: 0 0 5px var(--info-glow, rgba(48, 209, 88, 0.3));
        }
        body.style-digital .info-value {
            font-family: var(--tw-font-mono);
            font-weight: 700;
            color: var(--info-color, var(--tw-led-green));
            text-shadow:
                0 0 10px var(--info-color, var(--tw-led-green)),
                0 0 20px var(--info-color, var(--tw-led-green)),
                0 0 40px var(--info-glow, rgba(48, 209, 88, 0.4));
        }

        /* Flip style */
        body.style-flip .info-block {
            background: linear-gradient(180deg, rgba(42, 42, 53, 0.85) 0%, rgba(26, 26, 37, 0.85) 100%);
            border-radius: var(--tw-r-md);
            border: 1px solid var(--tw-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
        }
        body.style-flip .info-label { color: var(--info-color-dim, var(--tw-fg-muted)); }
        body.style-flip .info-value {
            font-family: var(--tw-font-sans);
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--info-color, var(--tw-fg));
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        /* Analog style — circular mini-clocks */
        body.style-analog .info-block {
            background: radial-gradient(circle at 30% 30%, rgba(40, 40, 60, 0.85), rgba(15, 15, 26, 0.95));
            border-radius: 50%;
            border: 1px solid rgba(10, 132, 255, 0.35);
            box-shadow:
                inset 0 0 30px rgba(0, 0, 0, 0.55),
                0 4px 20px rgba(0, 0, 0, 0.45);
            padding: 0;
            width: 100px;
            height: 100px;
            min-width: 100px;
            min-height: 100px;
            max-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Analog position overrides — keep circular blocks visually centered to anchor */
        body.style-analog .info-block.top-left    { top: 20px; left: 20px;  transform-origin: top left; }
        body.style-analog .info-block.top-center  { top: 20px; left: 50%; margin-left: -50px; transform-origin: top center; }
        body.style-analog .info-block.top-right   { top: 20px; right: 20px; transform-origin: top right; }
        body.style-analog .info-block.bottom-left  { bottom: 100px; left: 20px; transform-origin: bottom left; }
        body.style-analog .info-block.bottom-center { bottom: 100px; left: 50%; margin-left: -50px; transform-origin: bottom center; }
        body.style-analog .info-block.bottom-right { bottom: 100px; right: 20px; transform-origin: bottom right; }
        body.style-analog .info-block.top-left-third    { top: 20px; left: 20%; margin-left: -50px; transform-origin: top center; }
        body.style-analog .info-block.top-right-third   { top: 20px; right: 20%; margin-right: -50px; transform-origin: top center; }
        body.style-analog .info-block.bottom-left-third  { bottom: 100px; left: 20%; margin-left: -50px; transform-origin: bottom center; }
        body.style-analog .info-block.bottom-right-third { bottom: 100px; right: 20%; margin-right: -50px; transform-origin: bottom center; }

        body.style-analog .info-label {
            color: var(--info-color-dim, var(--tw-fg-muted));
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: absolute;
            top: 15%;
            z-index: 10;
        }

        body.style-analog .info-value {
            font-family: var(--tw-font-mono);
            font-weight: 600;
            color: var(--info-color, var(--tw-fg-secondary));
            font-size: 11px;
            position: absolute;
            bottom: 15%;
            z-index: 10;
        }

        body.style-analog .info-block { transform-origin: center center; }
        body.style-analog .info-block.visible { opacity: 1; transform: scale(var(--info-scale)); }

        /* Mini-clock face inside analog info-block */
        body.style-analog .info-block .mini-clock {
            position: absolute;
            width: 100%; height: 100%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: block;
        }
        body.style-analog .info-block .mini-hand {
            position: absolute;
            bottom: 50%; left: 50%;
            transform-origin: center bottom;
            border-radius: 2px;
        }
        body.style-analog .info-block .mini-hand-hour {
            width: 3px; height: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #bbbbbb 100%);
            transform: translateX(-50%) rotate(0deg);
            z-index: 2;
        }
        body.style-analog .info-block .mini-hand-minute {
            width: 2px; height: 26px;
            background: linear-gradient(180deg, #ffffff 0%, #cccccc 100%);
            transform: translateX(-50%) rotate(0deg);
            z-index: 3;
        }
        body.style-analog .info-block .mini-center {
            position: absolute;
            width: 6px; height: 6px;
            background: linear-gradient(135deg, #0a84ff, #30d158);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        body.style-analog .info-block .mini-tick {
            position: absolute;
            width: 1px; height: 4px;
            background: rgba(255, 255, 255, 0.22);
            left: 50%; top: 4px;
            transform-origin: center 46px;
        }
        body.style-analog .info-block .mini-tick.quarter {
            width: 2px; height: 6px;
            background: rgba(255, 255, 255, 0.68);
            top: 3px;
            transform-origin: center 47px;
        }

        /* ============================================================
           CIRCLE TIMER — the hero ring
           ============================================================ */
        .timer-ring {
            --ring-size: min(60vw, 55vh, 800px);
            position: relative;
            width: var(--ring-size);
            height: var(--ring-size);
            max-width: 800px;
            max-height: 800px;
            margin: 0 auto;
        }

        .timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            filter: drop-shadow(0 10px 40px rgba(0, 0, 0, 0.35));
        }

        .ring-bg {
            fill: rgba(255, 255, 255, 0.03);
            stroke: var(--tw-border);
            stroke-width: 2;
        }

        .ring-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke: url(#mainGradient);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset var(--tw-dur-slow) var(--tw-ease-out);
            filter: drop-shadow(0 0 15px var(--glow-color, rgba(10, 132, 255, 0.55)));
        }

        .ring-progress.warning {
            stroke: url(#warningGradient);
            filter: drop-shadow(0 0 15px rgba(255, 193, 7, 0.6));
        }

        .ring-progress.danger {
            stroke: url(#dangerGradient);
            filter: drop-shadow(0 0 20px rgba(255, 68, 68, 0.7));
            animation: danger-pulse 1s infinite;
        }

        /* OVERTIME — dashed orange ring, per SKILL overtime-storyboard */
        .ring-progress.overtime {
            stroke: url(#warningGradient);
            stroke-dasharray: 4 6;
            filter: drop-shadow(0 0 20px rgba(255, 159, 10, 0.7));
            animation: danger-pulse 1s infinite;
        }

        @keyframes danger-pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.55; }
        }

        .tick-line {
            stroke: rgba(255, 255, 255, 0.14);
            stroke-width: 1.5;
        }
        .tick-line.major {
            stroke: rgba(255, 255, 255, 0.32);
            stroke-width: 2.5;
        }

        /* Center numeral */
        .center-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 75%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time-text {
            font-size: calc(var(--ring-size, 400px) * 0.22);
            font-weight: 200;
            font-family: var(--tw-font-display);
            color: var(--tw-fg);
            letter-spacing: 0.02em;
            font-variant-numeric: tabular-nums;
            text-shadow:
                0 4px 8px rgba(0, 0, 0, 0.4),
                0 0 60px var(--text-glow, rgba(10, 132, 255, 0.55));
            transition: color var(--tw-dur-base) var(--tw-ease-out),
                        text-shadow var(--tw-dur-base) var(--tw-ease-out),
                        font-size var(--tw-dur-base) var(--tw-ease-out);
            white-space: nowrap;
            line-height: 1;
        }

        .time-text.compact {
            font-size: calc(var(--ring-size, 400px) * 0.16);
            letter-spacing: 0.01em;
        }

        .time-text.warning { color: var(--tw-yellow); --text-glow: rgba(255, 193, 7, 0.6); }
        .time-text.danger {
            color: #ff4444;
            --text-glow: rgba(255, 68, 68, 0.7);
            animation: time-pulse 0.5s infinite;
        }
        .time-text.overtime {
            color: var(--tw-orange);
            --text-glow: rgba(255, 159, 10, 0.7);
        }

        .time-minus,
        .analog-time-minus {
            display: inline-block;
            margin-left: -0.6em;
            margin-right: 0.05em;
        }

        @keyframes time-pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.02); }
        }

        /* ============================================================
           STATUS PILL — 3 semantic tiers, color + glyph
           ============================================================ */
        .status-container {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 26px;
            border-radius: var(--tw-r-pill);
            background: var(--tw-overlay-medium);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            border: 1px solid var(--tw-border);
            color: var(--tw-fg-secondary);
            font-family: var(--tw-font-sans);
            font-size: 1.1em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: background var(--tw-dur-base) var(--tw-ease),
                        color var(--tw-dur-base) var(--tw-ease),
                        border-color var(--tw-dur-base) var(--tw-ease),
                        box-shadow var(--tw-dur-base) var(--tw-ease);
        }

        /* Glyph — pseudo-element carries state glyph (·/▶/‖/⧗/×) per SKILL */
        .status-pill .status-glyph {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--tw-font-sans);
            font-weight: 700;
            font-size: 0;
            min-width: 14px;
            color: currentColor;
        }
        .status-pill .status-glyph::before {
            content: '·';
            font-size: 1rem;
            line-height: 1;
        }
        .status-pill.running  .status-glyph::before { content: '▶'; font-size: 0.85rem; }
        .status-pill.paused   .status-glyph::before { content: '‖'; font-size: 1rem; }
        .status-pill.overtime .status-glyph::before { content: '⧗'; font-size: 1rem; }
        .status-pill.finished .status-glyph::before { content: '×'; font-size: 1.1rem; }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            animation: dot-pulse 2s infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.8); }
        }

        /* Success tier — РАБОТАЕТ */
        .status-pill.running {
            background: rgba(48, 209, 88, 0.18);
            color: var(--tw-green);
            border-color: rgba(48, 209, 88, 0.32);
            box-shadow: 0 0 25px rgba(48, 209, 88, 0.2);
        }
        /* Attention tier — OVERTIME, FINISHED */
        .status-pill.overtime {
            background: rgba(255, 159, 10, 0.2);
            color: var(--tw-orange);
            border-color: rgba(255, 159, 10, 0.38);
            box-shadow: 0 0 25px rgba(255, 159, 10, 0.3);
            animation: overtime-pulse 0.8s infinite;
        }
        @keyframes overtime-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 25px rgba(255, 159, 10, 0.3); }
            50%      { opacity: 0.85; box-shadow: 0 0 40px rgba(255, 159, 10, 0.5); }
        }
        /* Neutral tier — ПАУЗА */
        .status-pill.paused {
            background: rgba(245, 87, 108, 0.16);
            color: var(--tw-pink);
            border-color: rgba(245, 87, 108, 0.3);
        }
        .status-pill.paused .status-dot { animation: none; }
        /* Attention tier — ЗАВЕРШЁН */
        .status-pill.finished {
            background: rgba(255, 69, 58, 0.22);
            color: var(--tw-red);
            border-color: rgba(255, 69, 58, 0.38);
            animation: finished-pulse 0.5s infinite;
        }
        @keyframes finished-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 25px rgba(255, 69, 58, 0.3); }
            50%      { opacity: 0.75; box-shadow: 0 0 40px rgba(255, 69, 58, 0.5); }
        }

        body.flash-mode { animation: flash-bg 0.3s; }
        @keyframes flash-bg {
            0%, 100% { filter: brightness(1); }
            50%      { filter: brightness(1.5); }
        }

        /* ===== Per-style status pill ===== */
        body.style-digital .status-pill {
            background: transparent;
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-r-md);
            color: var(--tw-led-green);
            text-shadow: 0 0 10px var(--tw-led-green);
            box-shadow: none;
        }
        body.style-digital .status-pill.running  { color: var(--tw-led-green); text-shadow: 0 0 15px var(--tw-led-green); }
        body.style-digital .status-pill.paused   { color: var(--tw-led-warn); text-shadow: 0 0 10px var(--tw-led-warn); }
        body.style-digital .status-pill.finished { color: var(--tw-led-danger); text-shadow: 0 0 15px var(--tw-led-danger); }
        body.style-digital .status-pill.overtime {
            color: var(--tw-led-danger);
            text-shadow: 0 0 15px var(--tw-led-danger);
            animation: led-overtime-pulse 1s infinite;
        }
        @keyframes led-overtime-pulse {
            0%, 100% { text-shadow: 0 0 15px #ff3333; }
            50%      { text-shadow: 0 0 30px #ff3333, 0 0 50px #ff3333; }
        }
        body.style-digital .status-dot { box-shadow: 0 0 8px currentColor; }

        body.style-flip .status-pill {
            background: linear-gradient(180deg, rgba(42, 42, 53, 0.85) 0%, rgba(26, 26, 37, 0.85) 100%);
            border-radius: var(--tw-r-sm);
            border: 1px solid var(--tw-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.45);
        }

        /* ============================================================
           DIGITAL LED STYLE
           ============================================================ */
        .timer-digital {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--tw-s-10);
        }
        .timer-digital.active { display: flex; }

        .digital-display {
            background: var(--tw-bg-led);
            border: 1px solid var(--tw-border-strong);
            border-radius: var(--tw-r-2xl);
            padding: 40px 60px;
            box-shadow:
                inset 0 0 50px rgba(0, 0, 0, 0.75),
                0 8px 40px rgba(0, 0, 0, 0.55),
                0 0 60px rgba(48, 209, 88, 0.12);
            position: relative;
            overflow: hidden;
        }
        .digital-display::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 19px 19px 0 0;
        }

        .digital-time {
            font-family: var(--tw-font-mono);
            font-size: clamp(4rem, 12vw, 12rem);
            font-weight: 700;
            color: var(--tw-led-green);
            text-shadow:
                0 0 20px var(--tw-led-green),
                0 0 40px var(--tw-led-green),
                0 0 80px rgba(48, 209, 88, 0.4);
            letter-spacing: 8px;
            position: relative;
            font-variant-numeric: tabular-nums;
        }

        .digital-time.warning {
            color: var(--tw-led-warn);
            text-shadow:
                0 0 20px var(--tw-led-warn),
                0 0 40px var(--tw-led-warn),
                0 0 80px rgba(255, 204, 0, 0.4);
        }
        .digital-time.danger {
            color: var(--tw-led-danger);
            text-shadow:
                0 0 20px var(--tw-led-danger),
                0 0 40px var(--tw-led-danger),
                0 0 80px rgba(255, 51, 51, 0.4);
            animation: led-danger-pulse 1s infinite;
        }
        .digital-time.overtime {
            color: var(--tw-orange);
            text-shadow:
                0 0 20px var(--tw-orange),
                0 0 40px var(--tw-orange),
                0 0 80px rgba(255, 159, 10, 0.4);
            animation: led-danger-pulse 1s infinite;
        }

        @keyframes led-danger-pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.7; }
        }

        .digital-dots {
            display: inline-block;
            animation: dots-blink 1s infinite;
        }
        @keyframes dots-blink {
            0%, 50%   { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        /* ============================================================
           FLIP STYLE
           ============================================================ */
        .timer-flip {
            display: none;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: var(--tw-s-10);
        }
        .timer-flip.active { display: flex; }

        .flip-group { display: flex; gap: 8px; }

        .flip-separator {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 200;
            font-family: var(--tw-font-display);
            color: var(--tw-fg-muted);
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .flip-minus {
            position: relative;
            width: clamp(35px, 6vw, 80px);
            height: clamp(50px, 10vw, 120px);
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #2a2a35 0%, #1a1a25 100%);
            border-radius: var(--tw-r-md);
            border: 1px solid var(--tw-border);
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            margin-right: 10px;
        }

        .flip-minus-sign {
            font-family: var(--tw-font-display);
            font-size: clamp(2rem, 7vw, 5rem);
            font-weight: 700;
            color: var(--tw-red);
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(255, 69, 58, 0.5);
        }
        .flip-minus.visible { display: flex; }

        .flip-card {
            position: relative;
            width: clamp(60px, 12vw, 160px);
            height: clamp(80px, 16vw, 200px);
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #2a2a35 0%, #1a1a25 49.9%, #151520 50%, #0a0a15 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--tw-r-lg);
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .flip-card-inner::before {
            content: '';
            position: absolute;
            top: 49.5%; left: 0; right: 0;
            height: 2px;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }
        .flip-card-inner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.07) 0%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        .flip-digit {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--tw-font-display);
            font-size: clamp(2.5rem, 9vw, 7rem);
            font-weight: 600;
            color: var(--tw-fg);
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .flip-card.warning .flip-digit { color: var(--tw-yellow); }
        .flip-card.danger .flip-digit  { color: #ff4444; }
        .flip-card.overtime .flip-digit { color: var(--tw-orange); }
        .flip-card.danger {
            animation: flip-danger-pulse 1s infinite;
            box-shadow:
                inset 0 1px 0 rgba(255, 68, 68, 0.15),
                0 4px 20px rgba(255, 68, 68, 0.2);
        }
        @keyframes flip-danger-pulse {
            0%, 100% { box-shadow: inset 0 1px 0 rgba(255,68,68,0.15), 0 4px 20px rgba(255,68,68,0.2); }
            50%      { box-shadow: inset 0 1px 0 rgba(255,68,68,0.3),  0 4px 30px rgba(255,68,68,0.4); }
        }

        .flip-label {
            text-align: center;
            margin-top: 15px;
            font-family: var(--tw-font-sans);
            font-size: var(--tw-t-caption);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--tw-fg-dim);
            display: none;
        }

        .flip-card.flipping .flip-card-inner {
            animation: flip-animation 0.3s ease-in-out;
        }
        @keyframes flip-animation {
            0%   { transform: rotateX(0); }
            50%  { transform: rotateX(-10deg); }
            100% { transform: rotateX(0); }
        }

        /* Hide inactive timer styles — all hidden by default */
        .timer-ring,
        .timer-digital,
        .timer-flip,
        .timer-analog { display: none !important; }

        .timer-ring.active    { display: block !important; }
        .timer-digital.active { display: flex !important; }
        .timer-flip.active    { display: flex !important; }
        .timer-analog.active  { display: flex !important; }

        /* ============================================================
           ANALOG STYLE
           ============================================================ */
        .timer-analog {
            --analog-size: min(55vw, 50vh, 700px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: var(--tw-s-10);
        }

        .analog-clock {
            position: relative;
            width: var(--analog-size);
            height: var(--analog-size);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(40, 40, 60, 0.85) 0%, rgba(15, 15, 26, 0.95) 70%);
            box-shadow:
                0 0 0 8px rgba(10, 132, 255, 0.25),
                0 0 0 12px rgba(10, 132, 255, 0.08),
                inset 0 0 60px rgba(0, 0, 0, 0.5),
                0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .analog-clock::before {
            content: '';
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.05), transparent 60%);
            pointer-events: none;
        }

        .clock-face { position: absolute; width: 100%; height: 100%; }

        .clock-tick {
            position: absolute;
            width: 2px; height: 12px;
            background: rgba(255, 255, 255, 0.28);
            left: 50%; top: 8%;
            transform-origin: 50% calc(var(--analog-size) * 0.42);
            border-radius: 1px;
        }
        .clock-tick.major {
            width: 3px; height: 20px;
            background: rgba(255, 255, 255, 0.58);
            top: 6%;
        }
        .clock-tick.quarter {
            width: 4px; height: 28px;
            background: linear-gradient(180deg, #0a84ff 0%, #30d158 100%);
            top: 4%;
            box-shadow: 0 0 10px rgba(10, 132, 255, 0.5);
        }

        .clock-numbers {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
        }
        .clock-numbers.visible { display: block; }

        .clock-number {
            position: absolute;
            font-family: var(--tw-font-display);
            font-size: calc(var(--analog-size) * 0.08);
            font-weight: 500;
            color: var(--tw-fg-secondary);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -50%);
        }
        .clock-number.n12 { top: 12%; left: 50%; }
        .clock-number.n1  { top: 17%; left: 74%; }
        .clock-number.n2  { top: 30%; left: 87%; }
        .clock-number.n3  { top: 50%; left: 92%; }
        .clock-number.n4  { top: 70%; left: 87%; }
        .clock-number.n5  { top: 83%; left: 74%; }
        .clock-number.n6  { top: 88%; left: 50%; }
        .clock-number.n7  { top: 83%; left: 26%; }
        .clock-number.n8  { top: 70%; left: 13%; }
        .clock-number.n9  { top: 50%; left: 8%; }
        .clock-number.n10 { top: 30%; left: 13%; }
        .clock-number.n11 { top: 17%; left: 26%; }

        .clock-hands { position: absolute; width: 100%; height: 100%; }

        .clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            border-radius: 4px;
        }

        .hand-hour {
            width: 6px;
            height: calc(var(--analog-size) * 0.22);
            background: linear-gradient(180deg, #ffffff 0%, #cccccc 100%);
            margin-left: -3px;
            z-index: 2;
        }
        .hand-minute {
            width: 4px;
            height: calc(var(--analog-size) * 0.32);
            background: linear-gradient(180deg, #ffffff 0%, #dddddd 100%);
            margin-left: -2px;
            z-index: 3;
        }
        .hand-second {
            width: 2px;
            height: calc(var(--analog-size) * 0.38);
            background: linear-gradient(180deg, #ff4444 0%, #cc0000 100%);
            margin-left: -1px;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
            z-index: 4;
        }
        .hand-second::after {
            content: '';
            position: absolute;
            bottom: -20%; left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: calc(var(--analog-size) * 0.08);
            background: #ff4444;
            border-radius: 2px;
        }

        .clock-center {
            position: absolute;
            width: calc(var(--analog-size) * 0.04);
            height: calc(var(--analog-size) * 0.04);
            background: linear-gradient(135deg, #0a84ff, #30d158);
            border-radius: 50%;
            z-index: 10;
            box-shadow:
                0 0 15px rgba(10, 132, 255, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
        }
        .clock-center::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40%; height: 40%;
            background: var(--tw-fg);
            border-radius: 50%;
        }

        .analog-digital-time {
            position: absolute;
            bottom: 22%;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--tw-font-mono);
            font-size: calc(var(--analog-size) * 0.1);
            font-weight: 500;
            color: var(--tw-fg-muted);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }
        .analog-digital-time.warning { color: var(--tw-yellow); }
        .analog-digital-time.danger {
            color: #ff4444;
            animation: time-pulse 0.5s infinite;
        }
        .analog-digital-time.overtime {
            color: var(--tw-orange);
            animation: time-pulse 0.5s infinite;
        }

        .analog-ring {
            position: absolute;
            inset: 3%;
            border-radius: 50%;
            border: 1px solid rgba(10, 132, 255, 0.22);
            pointer-events: none;
        }

        .clock-brand {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--tw-font-display);
            font-size: calc(var(--analog-size) * 0.04);
            font-weight: 300;
            font-style: italic;
            color: var(--tw-fg-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        body.style-analog .status-pill {
            background: var(--tw-bg-surface);
            border: 1px solid rgba(10, 132, 255, 0.3);
        }

        /* ============================================================
           WINDOW CONTROLS (close / minimize / fullscreen)
           ============================================================ */
        .window-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity var(--tw-dur-slow) var(--tw-ease);
        }
        body:hover .window-controls { opacity: 0.45; }
        .window-controls:hover { opacity: 1 !important; }

        .window-ctrl-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--tw-border);
            border-radius: 50%;
            background: var(--tw-overlay-light);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            color: var(--tw-fg-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--tw-dur-base) var(--tw-ease),
                        color var(--tw-dur-base) var(--tw-ease),
                        border-color var(--tw-dur-base) var(--tw-ease),
                        transform var(--tw-dur-fast) var(--tw-ease);
        }
        .window-ctrl-btn:hover {
            background: var(--tw-overlay-medium);
            color: var(--tw-fg);
        }
        .window-ctrl-btn:active { transform: scale(0.96); }
        .window-ctrl-btn.fullscreen-btn:hover { background: rgba(48, 209, 88, 0.7); border-color: rgba(48, 209, 88, 0.45); }
        .window-ctrl-btn.close-btn:hover      { background: rgba(255, 69, 58, 0.75); border-color: rgba(255, 69, 58, 0.5); }

        /* Hand warning/danger cues */
        .hand-minute.warning,
        .hand-second.warning {
            filter: hue-rotate(-30deg) saturate(1.5);
        }
        .clock-center.warning {
            background: linear-gradient(135deg, var(--tw-yellow), #ff9800);
        }
        .hand-minute.danger,
        .hand-second.danger {
            animation: hand-pulse 0.5s infinite;
        }
        .clock-center.danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            animation: center-pulse 0.5s infinite;
        }
        @keyframes hand-pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.6; }
        }
        @keyframes center-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 68, 68, 0.6); }
            50%      { box-shadow: 0 0 30px rgba(255, 68, 68, 0.9); }
        }

        /* ============================================================
           ALT DRAG MODE
           ============================================================ */
        body.alt-active .info-block.visible {
            cursor: grab;
            outline: 1px dashed rgba(255, 255, 255, 0.3);
            outline-offset: 4px;
        }
        body.alt-active .info-block.visible:hover {
            outline-color: rgba(10, 132, 255, 0.6);
        }
        body.alt-active .info-block.dragging-block {
            cursor: grabbing;
            outline-color: rgba(10, 132, 255, 0.8);
            z-index: 101;
        }

        /* Custom-positioned blocks — override preset class positioning */
        .info-block.custom-position { transform-origin: center center; }
        .info-block.custom-position.visible { transform: scale(var(--info-scale)); }

        /* Controls hint — fades out after 4s of mouse inactivity */
        .controls-hint {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            background: var(--tw-bg-surface);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            color: var(--tw-fg-muted);
            font-family: var(--tw-font-sans);
            font-size: var(--tw-t-caption);
            padding: 8px 16px;
            border-radius: var(--tw-r-lg);
            border: 1px solid var(--tw-border);
            opacity: 1;
            transition: opacity 400ms var(--tw-ease);
            pointer-events: none;
            white-space: nowrap;
        }
        .controls-hint.faded { opacity: 0; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Hero label — «Осталось» above the timer */
        .hero-label {
            font-size: 22px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 24px;
            text-align: center;
        }

        /* Chip semantic states (additive on top of existing status-pill tiers) */
        .status-pill.is-success {
            background: rgba(48,209,88,0.22);
            color: var(--tw-green);
            border-color: rgba(48,209,88,0.4);
        }
        .status-pill.is-attention {
            background: rgba(255,69,58,0.22);
            color: var(--tw-red);
            border-color: rgba(255,69,58,0.4);
        }

        /* Focus ring — mandatory keyboard a11y */
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        [role="button"]:focus-visible,
        [tabindex]:focus-visible {
            outline: none;
            box-shadow: var(--tw-focus-ring);
        }
    </style>
</head>
<body>
    <div class="controls-hint" id="controlsHint">Ctrl+колесо — масштаб таймера (на блоках — блоки) · Shift+колесо — блоки · Alt — переместить · 1-8 — пресеты</div>

    <!-- Кнопки управления окном -->

    <!-- Информационные блоки (независимое позиционирование) -->
    <div class="info-block top-left" id="currentTimeBlock">

            <div class="mini-tick" style="transform: translateX(-50%) rotate(240deg);"></div>

            <div class="mini-tick" style="transform: translateX(-50%) rotate(330deg);"></div>

            <div class="mini-hand mini-hand-minute"></div>
            <div class="mini-center"></div>

    </div>
    <div class="info-block top-right" id="eventTimeBlock">

            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(0deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(30deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(60deg);"></div>
            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(90deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(120deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(150deg);"></div>
            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(180deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(210deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(240deg);"></div>
            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(270deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(300deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(330deg);"></div>
            <div class="mini-hand mini-hand-hour"></div>
            <div class="mini-hand mini-hand-minute"></div>
            <div class="mini-center"></div>
        </div>
        <div class="info-value" id="eventTime">10:00</div>
    </div>
    <div class="info-block bottom-center" id="endTimeBlock">
        <div class="info-label">Окончание</div>

            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(0deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(30deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(60deg);"></div>
            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(90deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(120deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(150deg);"></div>
            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(180deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(210deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(240deg);"></div>
            <div class="mini-tick quarter" style="transform: translateX(-50%) rotate(270deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(300deg);"></div>
            <div class="mini-tick" style="transform: translateX(-50%) rotate(330deg);"></div>
            <div class="mini-hand mini-hand-hour"></div>
            <div class="mini-hand mini-hand-minute"></div>
            <div class="mini-center"></div>
        </div>
        <div class="info-value" id="endTime">12:00</div>
    </div>

    <div class="display-container">
        <div class="hero-label" id="heroLabel">Осталось</div>
        <div class="timer-ring active" id="timerRing">
            <svg class="timer-svg" viewBox="0 0 400 400">
                <defs>
                    <!-- Основной градиент -->
                    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">

                    <!-- Предупреждение -->
                    <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffc107" />
                        <stop offset="100%" stop-color="#ff9800" />
                    </linearGradient>
                    <!-- Опасность -->
                    <linearGradient id="dangerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff4444" />
                        <stop offset="100%" stop-color="#cc0000" />
                    </linearGradient>
                </defs>

                <!-- Фоновый круг -->
                <circle class="ring-bg" cx="200" cy="200" r="185" />

                <!-- Деления -->
                <g class="tick-marks">
                    <!-- 12 делений (каждые 30 градусов) -->
                    <line class="tick-line major" x1="200" y1="25" x2="200" y2="45" />
                    <line class="tick-line" x1="200" y1="25" x2="200" y2="40" transform="rotate(30, 200, 200)" />

                    <line class="tick-line major" x1="200" y1="25" x2="200" y2="45" transform="rotate(180, 200, 200)" />
                    <line class="tick-line" x1="200" y1="25" x2="200" y2="40" transform="rotate(210, 200, 200)" />
                    <line class="tick-line" x1="200" y1="25" x2="200" y2="40" transform="rotate(240, 200, 200)" />
                    <line class="tick-line major" x1="200" y1="25" x2="200" y2="45" transform="rotate(270, 200, 200)" />
                    <line class="tick-line" x1="200" y1="25" x2="200" y2="40" transform="rotate(300, 200, 200)" />
                    <line class="tick-line" x1="200" y1="25" x2="200" y2="40" transform="rotate(330, 200, 200)" />
                </g>

                <!-- Трек прогресса -->
                <circle class="ring-track" cx="200" cy="200" r="160" />

                <!-- Прогресс -->
                <circle class="ring-progress" id="progressRing" cx="200" cy="200" r="160"
                        stroke-dasharray="1005.31"
                        stroke-dashoffset="1005.31" />
            </svg>

            <!-- Центральное отображение времени -->
            <div class="center-display">
                <div class="time-text" id="timeDisplay">00:00</div>
            </div>
        </div>

        <!-- Стиль: Цифровой LED -->
        <div class="timer-digital" id="timerDigital">
            <div class="digital-display">
                <div class="digital-time" id="digitalTime">
                    <span id="digitalHoursGroup" style="display:none"><span id="digitalHours">0</span><span class="digital-dots">:</span></span><span id="digitalMinutes">00</span><span class="digital-dots">:</span><span id="digitalSeconds">00</span>
                </div>

        <!-- Стиль: Перекидные часы -->
        <div class="timer-flip" id="timerFlip">

            <div class="flip-unit" id="flipHoursUnit" style="display:none">
                <div class="flip-group" id="flipHours">
                    <div class="flip-card" id="flipHr1">
                        <div class="flip-card-inner">
                            <span class="flip-digit">0</span>
                        </div>
                    </div>
                    <div class="flip-card" id="flipHr2">
                        <div class="flip-card-inner">

                </div>

            <div class="flip-separator" id="flipHoursSep" style="display:none">:</div>
