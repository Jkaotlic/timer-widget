        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: var(--tw-font-sans);
            /* Near-transparent background enables drag/hit-testing on Windows transparent windows */
            background: rgba(0, 0, 0, 0.01);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Widget container — no outer shadow (transparent Electron window) */
        .widget-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            container-type: size;
            container-name: widget;
        }

        /* ============================================
           СТИЛЬ: КРУГОВОЙ (Circle)
           ============================================ */
        .circular-widget {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5%;
            box-sizing: border-box;
        }

        .widget-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            pointer-events: none;
        }

        /* Glass face backdrop behind the ring */
        .bg-circle {
            fill: var(--widget-bg-fill, var(--tw-bg-timer));
            stroke: var(--tw-border-strong);
            stroke-width: 1.5;
        }

        /* Background image mode */
        .widget-bg-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            height: 92%;
            border-radius: 50%;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .widget-bg-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .widget-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
        }

        /* Decorative inner ring */
        .inner-glow {
            fill: none;
            stroke: var(--tw-overlay-light);
            stroke-width: 1;
        }

        /* Progress track (background) */
        .progress-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 6;
        }

        /* Progress ring — blue→green gradient @ 135° */
        .progress-bar {
            fill: none;
            stroke: url(#widgetGradient);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset var(--tw-dur-slow) var(--tw-ease);
            filter: drop-shadow(0 0 12px rgba(10, 132, 255, 0.35));
        }

        .progress-bar[data-status="warning"] {
            stroke: url(#warningGradient);
            filter: drop-shadow(0 0 12px rgba(255, 193, 7, 0.4));
        }

        .progress-bar[data-status="danger"],
        .progress-bar[data-status="overtime"] {
            stroke: url(#dangerGradient);
            filter: drop-shadow(0 0 14px rgba(255, 68, 68, 0.55));
            animation: pulse-glow 1s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.6; }
        }

        /* Tick marks */
        .tick-marks {
            display: none;
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1;
        }

        .ticks-on .tick-marks { display: inline; }

        .tick-marks-major {
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 2;
        }

        /* Centered time + status */
        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .time-display {
            /* Размер подогнан так, чтобы даже вариант с минусом (-MM:SS, 6 символов)
               умещался внутри кольца круга с запасом на padding 5%. */
            font-size: clamp(1.2rem, min(15vw, 15vh), 16rem);
            font-weight: 200;
            color: var(--tw-fg);
            font-family: var(--tw-font-display);
            letter-spacing: 0.02em;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 20px var(--glow-color, rgba(10, 132, 255, 0.6));
            transition: color var(--tw-dur-base) var(--tw-ease),
                        text-shadow var(--tw-dur-base) var(--tw-ease);
            white-space: nowrap;
        }

        .time-display[data-status="warning"] {
            color: var(--tw-yellow);
            --glow-color: rgba(255, 193, 7, 0.6);
        }

        .time-display[data-status="danger"],
        .time-display[data-status="overtime"] {
            color: #ff4444;
            --glow-color: rgba(255, 68, 68, 0.8);
            /* Убираем letter-spacing в перерасходе — «-» + 5 цифр уже шире обычного */
            letter-spacing: 0;
            animation: time-pulse 1s ease-in-out infinite;
        }

        /* Sign slot — фиксированная ширина, цифры остаются в центре кольца */
        .time-display .tm-sign {
            display: inline-block;
            width: 0.55ch;
            text-align: right;
            margin-right: 0.05ch;
        }

        @keyframes time-pulse {
            0%, 100% { transform: scale(1); }
            50%     { transform: scale(1.015); }
        }

        /* Status chip — pill, backdrop-blur, 3 semantic tiers */
        .status-badge {
            margin-top: clamp(4px, 2vh, 16px);
            padding: clamp(4px, 1.5vh, 10px) clamp(10px, 4vw, 24px);
            border-radius: var(--tw-r-pill);
            font-size: clamp(0.5rem, min(3vw, 3vh), 5rem);
            font-weight: 600;
            font-family: var(--tw-font-sans);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--tw-overlay-medium);
            color: var(--tw-fg-secondary);
            -webkit-backdrop-filter: var(--tw-blur-xs);
            backdrop-filter: var(--tw-blur-xs);
            border: 1px solid transparent;
            transition: background var(--tw-dur-base) var(--tw-ease),
                        color var(--tw-dur-base) var(--tw-ease),
                        border-color var(--tw-dur-base) var(--tw-ease);
        }

        .status-badge.running {
            background: rgba(48, 209, 88, 0.18);
            color: var(--tw-green);
            border-color: rgba(48, 209, 88, 0.32);
        }

        .status-badge.paused {
            background: rgba(245, 87, 108, 0.2);
            color: var(--tw-pink);
            border-color: rgba(245, 87, 108, 0.32);
        }

        .status-badge.finished {
            background: rgba(255, 193, 7, 0.2);
            color: var(--tw-yellow);
            border-color: rgba(255, 193, 7, 0.32);
            animation: badge-pulse 0.8s ease-in-out infinite;
        }

        @keyframes badge-pulse {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.6; }
        }

        /* ============================================
           СТИЛЬ: ЦИФРОВОЙ LED (Digital)
           — Dark enclosure + JetBrains Mono green glow
           ============================================ */
        .widget-digital {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 5%;
            overflow: hidden;
        }

        .widget-digital.active {
            display: flex;
        }

        .widget-digital-display {
            background: rgba(10, 10, 15, 0.85);
            -webkit-backdrop-filter: var(--tw-blur-sm);
            backdrop-filter: var(--tw-blur-sm);
            border: 1px solid var(--tw-border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10%;
            position: relative;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            overflow: hidden;
        }

        .widget-digital-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 14px 14px 0 0;
        }

        .widget-digital-time {
            font-family: var(--tw-font-mono);
            font-size: var(--digital-font-size, 24px);
            font-weight: 700;
            color: var(--tw-led-green);
            text-shadow:
                0 0 10px currentColor,
                0 0 20px currentColor,
                0 0 40px color-mix(in srgb, currentColor 40%, transparent);
            letter-spacing: 0.04em;
            white-space: nowrap;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .widget-digital-time[data-status="warning"] {
            color: var(--tw-led-warn);
        }

        .widget-digital-time[data-status="danger"],
        .widget-digital-time[data-status="overtime"] {
            color: var(--tw-led-danger);
            animation: widget-led-pulse 1s ease-in-out infinite;
        }

        @keyframes widget-led-pulse {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.65; }
        }

        /* ============================================
           СТИЛЬ: ПЕРЕКИДНЫЕ ЧАСЫ (Flip)
           — Inter 600, split-flap cards, gradient colon
           ============================================ */
        .widget-flip {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 5%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .widget-flip.active {
            display: flex;
        }

        .widget-flip-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform-origin: center;
            transform: scale(var(--flip-scale, 1));
        }

        .widget-flip-group {
            display: flex;
            gap: 6px;
        }

        /* Colon separator: two gradient dots (blue→green, stacked).
           Kit recipe — sound-tab.html / widget.html flip-colon.
           Text content of the separator is hidden (font-size 0) so it
           doesn't render a glyph; pseudo-elements paint the dots. */
        .widget-flip-separator {
            font-size: 0;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 6px;
            height: 90px;
        }
        .widget-flip-separator::before,
        .widget-flip-separator::after {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tw-blue), var(--tw-green));
            box-shadow: 0 0 8px rgba(10, 132, 255, 0.6);
        }

        .widget-flip-minus {
            position: relative;
            width: 25px;
            height: 45px;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #2a2a35 0%, #1a1a25 50%, #151520 50%, #0a0a15 100%);
            border-radius: var(--tw-r-sm);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08),
                        inset 0 -2px 4px rgba(0, 0, 0, 0.4);
            margin-right: 4px;
        }

        .widget-flip-minus-sign {
            font-family: var(--tw-font-sans);
            font-size: 32px;
            font-weight: 700;
            color: var(--tw-red);
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 10px rgba(255, 69, 58, 0.5);
        }

        .widget-flip-minus.visible {
            display: flex;
        }

        .widget-flip-card {
            position: relative;
            width: 62px;
            height: 90px;
        }

        .widget-flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                #2a2a35 0%,
                #1a1a25 50%,
                #151520 50%,
                #0a0a15 100%);
            border-radius: var(--tw-r-sm);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        /* Split-flap hairline — clipped inside opaque card (overflow:hidden) */
        .widget-flip-inner::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(180deg,
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.9) 50%,
                rgba(255, 255, 255, 0.04) 50%,
                rgba(255, 255, 255, 0.04) 100%);
            z-index: 10;
        }

        .widget-flip-digit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--tw-font-sans);
            font-size: 52px;
            font-weight: 600;
            color: var(--tw-fg);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .widget-flip-card[data-status="warning"] .widget-flip-digit { color: var(--tw-yellow); }
        .widget-flip-card[data-status="danger"]   .widget-flip-digit,
        .widget-flip-card[data-status="overtime"] .widget-flip-digit { color: #ff4444; }
        .widget-flip-card[data-status="danger"],
        .widget-flip-card[data-status="overtime"] {
            animation: widget-flip-pulse 1s ease-in-out infinite;
        }

        @keyframes widget-flip-pulse {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.7; }
        }

        /* Adaptive sizing for 6-digit mode (H:MM:SS) */
        .widget-flip.has-hours .widget-flip-card {
            width: 44px;
            height: 64px;
        }

        .widget-flip.has-hours .widget-flip-separator {
            font-size: 36px;
        }

        .widget-flip.has-hours .widget-flip-digit {
            font-size: 36px;
        }

        /* Скрытие неактивных стилей - все скрыты по умолчанию */
        .circular-widget,
        .widget-digital,
        .widget-flip,
        .widget-analog {
            display: none !important;
        }
        
        /* Показываем только активный */
        .circular-widget.active { display: flex !important; }
        .widget-digital.active { display: flex !important; }
        .widget-flip.active { display: flex !important; }
        .widget-analog.active { display: flex !important; }

        /* ============================================
           СТИЛЬ: АНАЛОГОВЫЕ ЧАСЫ (Analog)
           — Radial face, gradient hour hand, red second hand
           ============================================ */
        .widget-analog {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 5%;
            box-sizing: border-box;
            overflow: visible;
        }

        .widget-analog-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-origin: center;
            transform: scale(var(--analog-scale, 1));
        }

        .widget-analog-clock {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 50%,
                    rgba(28, 28, 30, 0.82) 0%,
                    rgba(10, 10, 15, 0.95) 100%);
            -webkit-backdrop-filter: var(--tw-blur-sm);
            backdrop-filter: var(--tw-blur-sm);
            border: 1px solid var(--tw-border-strong);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tick marks on clock face */
        .widget-clock-tick {
            position: absolute;
            width: 2px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            left: 50%;
            top: 8%;
            transform-origin: 50% 63px;
            border-radius: 1px;
        }

        .widget-clock-tick.major {
            width: 2px;
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            top: 6%;
        }

        .widget-clock-tick.quarter {
            width: 3px;
            height: 14px;
            background: var(--tw-ring);
            top: 4%;
        }

        /* Hands */
        .widget-clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            border-radius: 2px;
        }

        .widget-hand-minute {
            width: 3px;
            height: 48px;
            background: linear-gradient(180deg, #0a84ff 0%, #30d158 100%);
            margin-left: -1.5px;
            z-index: 3;
        }

        .widget-hand-second {
            width: 2px;
            height: 57px;
            background: var(--tw-red);
            margin-left: -1px;
            z-index: 4;
        }

        .widget-clock-center {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--tw-ring);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.92);
            z-index: 5;
        }

        /* Digital time under the face */
        .widget-analog-digital {
            position: absolute;
            bottom: 20%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            font-family: var(--tw-font-mono);
            font-size: 14px;
            color: var(--tw-fg-muted);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px rgba(10, 132, 255, 0.3);
        }

        /* Numerals 12/3/6/9 */
        .widget-clock-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        .widget-clock-numbers.visible {
            display: block;
        }

        .widget-clock-number {
            position: absolute;
            font-family: var(--tw-font-sans);
            font-size: 14px;
            font-weight: 600;
            color: var(--tw-fg-muted);
            transform: translate(-50%, -50%);
        }

        .widget-clock-number.n12 { top: 15%; left: 50%; }
        .widget-clock-number.n3  { top: 50%; left: 88%; }
        .widget-clock-number.n6  { top: 85%; left: 50%; }
        .widget-clock-number.n9  { top: 50%; left: 12%; }

        /* Warning / danger for hands */
        .widget-hand-minute[data-status="warning"],
        .widget-hand-second[data-status="warning"] {
            filter: hue-rotate(-30deg) saturate(1.5);
        }

        .widget-hand-minute[data-status="danger"],
        .widget-hand-second[data-status="danger"],
        .widget-hand-minute[data-status="overtime"],
        .widget-hand-second[data-status="overtime"] {
            background: #ff453a !important;
            animation: widget-hand-pulse 0.8s ease-in-out infinite;
        }

        .widget-clock-center[data-status="danger"],
        .widget-clock-center[data-status="overtime"] {
            background: #ff453a;
            animation: widget-center-pulse 1s ease-in-out infinite;
        }

        .widget-analog-digital[data-status="danger"],
        .widget-analog-digital[data-status="overtime"] {
            color: #ff453a;
            text-shadow: 0 0 10px rgba(255, 69, 58, 0.5);
            animation: widget-analog-text-pulse 1s ease-in-out infinite;
        }

        @keyframes widget-hand-pulse {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.6; }
        }
        @keyframes widget-center-pulse {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.6; }
        }
        @keyframes widget-analog-text-pulse {
            0%, 100% { opacity: 1; }
            50%     { opacity: 0.7; }
        }

        /* First-run hint strip — inset shadow only, no outer */
        .widget-hint {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            color: var(--tw-fg-secondary);
            font-size: 10px;
            font-family: var(--tw-font-sans);
            letter-spacing: 0.2px;
            padding: 4px 10px;
            border-radius: var(--tw-r-sm);
            border: 1px solid var(--tw-border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            opacity: 0;
            animation: hintFade 4s var(--tw-ease) forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes hintFade {
            0%   { opacity: 0; }
            15%  { opacity: 1; }
            75%  { opacity: 1; }
            100% { opacity: 0; display: none; }
        }

        /* Focus-visible — a11y, mandatory */
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible,
        [role="button"]:focus-visible,
        [tabindex]:focus-visible {
            outline: none;
            box-shadow: var(--tw-focus-ring);
        }

        /* Reduced motion — collapse durations and kill pulses */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="widget-hint" id="widgetHint">Ctrl+колесо — масштаб</div>

    <div class="widget-container" id="widgetContainer">
        <!-- Фоновое изображение (для режима local/image) -->
        <div class="widget-bg-image" id="widgetBgImage" style="display: none;">
            <img id="widgetBgImg" src="" alt="">
            <div class="widget-bg-overlay" id="widgetBgOverlay"></div>
        </div>

        <!-- Контролы и настройки убраны — управление из главного окна -->

        <!-- Круговой виджет -->
        <div class="circular-widget active">
            <svg class="widget-svg" viewBox="0 0 200 200">
                <defs>
                    <!-- Основной градиент -->
                    <linearGradient id="widgetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#0a84ff" />
                        <stop offset="100%" stop-color="#30d158" />
                    </linearGradient>
                    <!-- Предупреждение -->
                    <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffc107" />
                        <stop offset="100%" stop-color="#ff9800" />
                    </linearGradient>
                    <!-- Опасность -->
                    <linearGradient id="dangerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff4444" />
                        <stop offset="100%" stop-color="#cc0000" />
                    </linearGradient>
                    <!-- Свечение -->
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Фоновый круг -->
                <circle class="bg-circle" cx="100" cy="100" r="95" />
                
                <!-- Внутреннее свечение -->
                <circle class="inner-glow" cx="100" cy="100" r="70" />

                <!-- Деления (12 шт) -->
                <g class="tick-marks" transform="rotate(-90, 100, 100)">
                    <line x1="100" y1="15" x2="100" y2="22" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(30, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(60, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="22" transform="rotate(90, 100, 100)" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(120, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(150, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="22" transform="rotate(180, 100, 100)" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(210, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(240, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="22" transform="rotate(270, 100, 100)" class="tick-marks-major" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(300, 100, 100)" />
                    <line x1="100" y1="15" x2="100" y2="20" transform="rotate(330, 100, 100)" />
                </g>

                <!-- Трек прогресса -->
                <circle class="progress-track" cx="100" cy="100" r="82" 
                        transform="rotate(-90, 100, 100)" />
                
                <!-- Прогресс-бар -->
                <circle class="progress-bar" id="progressBar" cx="100" cy="100" r="82" 
                        transform="rotate(-90, 100, 100)" 
                        stroke-dasharray="515.22" 
                        stroke-dashoffset="515.22" />
            </svg>

            <!-- Центральный контент -->
            <div class="center-content">
                <div class="time-display" id="timeDisplay"><span class="tm-sign" id="timeDisplaySign"></span><span class="tm-digits" id="timeDisplayDigits">00:00</span></div>
                <div class="status-badge" id="statusBadge">Готов</div>
            </div>
        </div>

        <!-- Стиль: Цифровой LED -->
        <div class="widget-digital" id="widgetDigital">
            <div class="widget-digital-display">
                <div class="widget-digital-time" id="widgetDigitalTime">00:00</div>
            </div>
        </div>

        <!-- Стиль: Перекидные часы -->
        <div class="widget-flip" id="widgetFlip">
            <div class="widget-flip-content" id="widgetFlipContent">
                <div class="widget-flip-minus" id="wFlipMinus"><span class="widget-flip-minus-sign">−</span></div>
                <!-- Группа часов (скрыта по умолчанию) -->
                <div class="widget-flip-group widget-flip-hours" id="wFlipHoursGroup" style="display: none;">
                    <div class="widget-flip-card" id="wFlipHr1">
                        <div class="widget-flip-inner">
                            <span class="widget-flip-digit">0</span>
                        </div>
                    </div>
                    <div class="widget-flip-card" id="wFlipHr2">
                        <div class="widget-flip-inner">
                            <span class="widget-flip-digit">0</span>
                        </div>
                    </div>
                </div>
                <div class="widget-flip-separator widget-flip-hours-sep" id="wFlipHoursSep" style="display: none;">:</div>
                <!-- Группа минут -->
                <div class="widget-flip-group">
                    <div class="widget-flip-card" id="wFlipMin1">
                        <div class="widget-flip-inner">
                            <span class="widget-flip-digit">0</span>
                        </div>
                    </div>
                    <div class="widget-flip-card" id="wFlipMin2">
                        <div class="widget-flip-inner">
                            <span class="widget-flip-digit">0</span>
                        </div>
                    </div>
                </div>
                <div class="widget-flip-separator">:</div>
                <!-- Группа секунд -->
                <div class="widget-flip-group">
                    <div class="widget-flip-card" id="wFlipSec1">
                        <div class="widget-flip-inner">
                            <span class="widget-flip-digit">0</span>
                        </div>
                    </div>
                    <div class="widget-flip-card" id="wFlipSec2">
                        <div class="widget-flip-inner">
                            <span class="widget-flip-digit">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Стиль: Аналоговые часы -->
        <div class="widget-analog" id="widgetAnalog">
            <div class="widget-analog-content">
                <div class="widget-analog-clock">
                    <!-- Деления -->
                    <div class="widget-clock-tick" style="transform: rotate(0deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(30deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(60deg);"></div>
                    <div class="widget-clock-tick quarter" style="transform: rotate(90deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(120deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(150deg);"></div>
                    <div class="widget-clock-tick major" style="transform: rotate(180deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(210deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(240deg);"></div>
                    <div class="widget-clock-tick quarter" style="transform: rotate(270deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(300deg);"></div>
                    <div class="widget-clock-tick" style="transform: rotate(330deg);"></div>
                    
                    <!-- Цифры (скрыты по умолчанию) -->
                    <div class="widget-clock-numbers" id="widgetClockNumbers">
                        <span class="widget-clock-number n12">12</span>
                        <span class="widget-clock-number n3">3</span>
                        <span class="widget-clock-number n6">6</span>
                        <span class="widget-clock-number n9">9</span>
                    </div>
                    
                    <!-- Цифровое время -->
                    <div class="widget-analog-digital" id="widgetAnalogDigital">00:00</div>
                    
                    <!-- Стрелки -->
                    <div class="widget-clock-hand widget-hand-minute" id="widgetHandMinute"></div>
                    <div class="widget-clock-hand widget-hand-second" id="widgetHandSecond"></div>
                    
                    <!-- Центр -->
                    <div class="widget-clock-center" id="widgetClockCenter"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- IPC Compatibility Layer (maps ipcRenderer to secure electronAPI) -->
    <script src="ipc-compat.js"></script>
    <script src="constants.js"></script>
    <script src="security.js"></script>
    <script src="utils.js"></script>

    <script>
        // ipcRenderer теперь доступен через ipc-compat.js (безопасно)

        // safeJSONParse доступна глобально из security.js

        function applyShowTicks(showTicks) {
            const el = document.querySelector('.widget-container') || document.body;
            el.classList.toggle('ticks-on', !!showTicks);
        }

        class WidgetTimer {
            constructor() {
                this.radius = 82;
                this.circumference = 2 * Math.PI * this.radius;
                this.totalSeconds = 0;
                this.remainingSeconds = 0;
                this.isRunning = false;
                this.isPaused = false;
                this.lastTimestamp = 0;
                this.lastUpdateCounter = -1;
                this._hasWidgetStyle = false;
                // Stored handler refs for cleanup
                this._handlers = {};

                this.initElements();
                this.initProgress();

                try {
                    this.loadSettings();
                    this.applyColors();
                    this.loadBackgroundSettings();
                } catch (e) {
                    console.warn('Widget init warning:', e.message);
                }

                applyShowTicks(false);
                this.setupIPC();
                this.setupEventListeners();
                this.setupSettings();
            }

            initElements() {
                this.container = document.getElementById('widgetContainer');
                this.timeDisplay = document.getElementById('timeDisplay');
                this.timeDisplaySign = document.getElementById('timeDisplaySign');
                this.timeDisplayDigits = document.getElementById('timeDisplayDigits');
                this.statusBadge = document.getElementById('statusBadge');
                this.progressBar = document.getElementById('progressBar');
                // Контролы убраны — управление из главного окна
                
                // Элементы для разных стилей
                this.circularWidget = document.querySelector('.circular-widget');
                this.widgetDigital = document.getElementById('widgetDigital');
                this.widgetFlip = document.getElementById('widgetFlip');
                this.widgetAnalog = document.getElementById('widgetAnalog');
                this.widgetDigitalTime = document.getElementById('widgetDigitalTime');
                this.widgetFlipContent = document.getElementById('widgetFlipContent');
                
                // Аналоговые элементы
                this.widgetHandMinute = document.getElementById('widgetHandMinute');
                this.widgetHandSecond = document.getElementById('widgetHandSecond');
                this.widgetClockCenter = document.getElementById('widgetClockCenter');
                this.widgetAnalogDigital = document.getElementById('widgetAnalogDigital');
                this.widgetClockNumbers = document.getElementById('widgetClockNumbers');
                
                // Flip карточки
                this.wFlipHr1 = document.getElementById('wFlipHr1');
                this.wFlipHr2 = document.getElementById('wFlipHr2');
                this.wFlipHoursGroup = document.getElementById('wFlipHoursGroup');
                this.wFlipHoursSep = document.getElementById('wFlipHoursSep');
                this.wFlipMinus = document.getElementById('wFlipMinus');
                this.wFlipMin1 = document.getElementById('wFlipMin1');
                this.wFlipMin2 = document.getElementById('wFlipMin2');
                this.wFlipSec1 = document.getElementById('wFlipSec1');
                this.wFlipSec2 = document.getElementById('wFlipSec2');
                
                // Текущий стиль
                this.timerStyle = 'circle';
                
                // Устанавливаем стиль по умолчанию
                if (this.circularWidget) this.circularWidget.classList.add('active');
                
                // Настраиваем масштабирование для digital и flip
                this.updateScaling();
                this._handlers.onResizeScaling = () => this.updateScaling();
                window.addEventListener('resize', this._handlers.onResizeScaling);
            }
            
            updateScaling() {
                const containerWidth = this.container.offsetWidth;
                const containerHeight = this.container.offsetHeight;
                
                // Размер шрифта для digital - подбираем чтобы текст вместился
                // Для таймера формат MM:SS или HH:MM:SS, +1 символ для возможного минуса при перерасходе
                const hasHours = this.wFlipHoursGroup && this.wFlipHoursGroup.style.display !== 'none';
                const baseCharCount = hasHours ? 8 : 5;
                const charCount = baseCharCount + 1; // +1 для знака минуса при перерасходе
                // Ширина символа примерно 0.6 от размера шрифта для моноширинного
                const maxFontByWidth = (containerWidth * 0.85) / (charCount * 0.6);
                const maxFontByHeight = containerHeight * 0.7;
                const digitalFontSize = Math.min(maxFontByWidth, maxFontByHeight);
                this.container.style.setProperty('--digital-font-size', digitalFontSize + 'px');
                
                // Масштаб для flip (базовая ширина с запасом для возможного знака минуса:
                // карточка минуса 25px + margin 4px ≈ 30px + буфер)
                const baseFlipWidth = hasHours ? 420 : 320;
                const baseFlipHeight = 100;
                
                const scaleX = (containerWidth * 0.9) / baseFlipWidth;
                const scaleY = (containerHeight * 0.9) / baseFlipHeight;
                const flipScale = Math.min(scaleX, scaleY);
                
                this.container.style.setProperty('--flip-scale', flipScale);
                
                // Масштаб для аналоговых часов (базовый размер 150px)
                const baseAnalogSize = 150;
                const analogScaleX = (containerWidth * 0.85) / baseAnalogSize;
                const analogScaleY = (containerHeight * 0.85) / baseAnalogSize;
                const analogScale = Math.min(analogScaleX, analogScaleY);
                
                this.container.style.setProperty('--analog-scale', analogScale);
            }

            initProgress() {
                this.progressBar.style.strokeDasharray = `${this.circumference}`;
                this.progressBar.style.strokeDashoffset = this.circumference;
            }

            setupEventListeners() {
                // JS-based window drag (replaces -webkit-app-region: drag)
                let isDragging = false;
                let dragStartX = 0, dragStartY = 0;

                this._handlers.onContainerMouseDown = (e) => {
                    isDragging = true;
                    dragStartX = e.screenX;
                    dragStartY = e.screenY;
                    e.preventDefault();
                };
                this.container.addEventListener('mousedown', this._handlers.onContainerMouseDown);

                this._handlers.onMouseMove = (e) => {
                    if (!isDragging) { return; }
                    const dx = e.screenX - dragStartX;
                    const dy = e.screenY - dragStartY;
                    if (dx !== 0 || dy !== 0) {
                        ipcRenderer.send('widget-move', { deltaX: dx, deltaY: dy });
                        dragStartX = e.screenX;
                        dragStartY = e.screenY;
                    }
                };
                document.addEventListener('mousemove', this._handlers.onMouseMove);

                this._handlers.onMouseUp = () => {
                    isDragging = false;
                };
                document.addEventListener('mouseup', this._handlers.onMouseUp);

                // Track window states for keyboard toggle shortcuts
                let _displayIsOpen = false;
                let _clockIsOpen = false;
                this._handlers.onDisplayWindowState = (_event, state) => {
                    _displayIsOpen = !!state.isOpen;
                };
                this._handlers.onClockWindowState = (_event, state) => {
                    _clockIsOpen = !!state.isOpen;
                };
                ipcRenderer.on('display-window-state', this._handlers.onDisplayWindowState);
                ipcRenderer.on('clock-window-state', this._handlers.onClockWindowState);

                // Keyboard shortcuts (Space, R, Escape, W, D, C)
                this._handlers.onKeyDown = (e) => {
                    if (e.ctrlKey || e.altKey || e.metaKey) { return; }
                    switch (e.code) {
                        case 'Space':
                            e.preventDefault();
                            if (widgetTimer.isRunning) {
                                ipcRenderer.send('timer-control', 'pause');
                            } else {
                                ipcRenderer.send('timer-control', 'start');
                            }
                            break;
                        case 'KeyR':
                            e.preventDefault();
                            ipcRenderer.send('timer-control', 'reset');
                            break;
                        case 'Escape':
                        case 'KeyW':
                            e.preventDefault();
                            ipcRenderer.send('close-widget');
                            break;
                        case 'KeyD':
                            e.preventDefault();
                            ipcRenderer.send(_displayIsOpen ? 'close-display' : 'open-display');
                            break;
                        case 'KeyC':
                            e.preventDefault();
                            ipcRenderer.send(_clockIsOpen ? 'close-clock-widget' : 'open-clock-widget');
                            break;
                    }

                    // 1-8: Quick timer presets (5, 10, 15, 20, 25, 30, 45, 60 minutes)
                    if (e.code >= 'Digit1' && e.code <= 'Digit8') {
                        e.preventDefault();
                        const presets = [300, 600, 900, 1200, 1500, 1800, 2700, 3600];
                        const idx = parseInt(e.code.replace('Digit', '')) - 1;
                        ipcRenderer.send('timer-command', { type: 'set', seconds: presets[idx] });
                    }
                };
                document.addEventListener('keydown', this._handlers.onKeyDown);

                // Ctrl+Wheel scaling — resize widget by 10% per scroll tick
                const WIDGET_BASE_SIZE = 250;
                const WIDGET_MIN_SCALE = 30;
                const WIDGET_MAX_SCALE = 600;
                let widgetScalePct = Math.round(window.outerWidth / WIDGET_BASE_SIZE * 100);
                this._handlers.onWheel = (e) => {
                    if (!e.ctrlKey) { return; }
                    e.preventDefault();
                    const step = 10;
                    const delta = e.deltaY < 0 ? step : -step;
                    const newPct = Math.max(WIDGET_MIN_SCALE, Math.min(WIDGET_MAX_SCALE, widgetScalePct + delta));
                    if (newPct === widgetScalePct) { return; }
                    widgetScalePct = newPct;
                    const newSize = Math.round(WIDGET_BASE_SIZE * newPct / 100);
                    ipcRenderer.send('widget-resize', { width: newSize, height: newSize });
                };
                document.addEventListener('wheel', this._handlers.onWheel, { passive: false });
                this._handlers.onResizeScalePct = () => {
                    widgetScalePct = Math.round(window.outerWidth / WIDGET_BASE_SIZE * 100);
                };
                window.addEventListener('resize', this._handlers.onResizeScalePct);
            }

            setupSettings() {
                // Настройки управляются из главного окна
            }

            setSize(size) {
                const sizes = {
                    small: { width: 180, height: 180 },
                    medium: { width: 250, height: 250 },
                    large: { width: 350, height: 350 },
                    xlarge: { width: 500, height: 500 }
                };

                const s = sizes[size];
                if (s) {
                    ipcRenderer.send('widget-resize', s);
                    localStorage.setItem('widgetSize', size);
                }
            }

            loadSettings() {
                // Настройки виджета
                const settings = localStorage.getItem('widgetSettings');
                if (settings) {
                    const s = safeJSONParse(settings, {});
                    if (s && s.opacity) {
                        this.container.style.opacity = s.opacity;
                    }
                }

                // Размер
                const savedSize = localStorage.getItem('widgetSize') || 'medium';
                this.setSize(savedSize);
            }

            saveSettings() {
                const settings = {
                    opacity: parseFloat(this.container.style.opacity) || 1
                };
                localStorage.setItem('widgetSettings', JSON.stringify(settings));
            }

            // FIX BUG-020: Removed checkColorChanges() - dead code
            // Colors are updated via IPC 'colors-update' event, no need for polling

            applyColors(colors = null) {
                if (!colors) {
                    const saved = localStorage.getItem('timerColors');
                    colors = saved ? safeJSONParse(saved, {
                        timer: '#0a84ff',
                        progress: '#30d158'
                    }) : {
                        timer: '#0a84ff',
                        progress: '#30d158'
                    };
                }

                // Валидация цветов
                const isSafeColor = (v) => typeof v === 'string' && /^#[0-9a-fA-F]{3,8}$|^rgba?\([\d,.\s%]+\)$/.test(v);
                const timerColor = isSafeColor(colors.timer) ? colors.timer : null;
                const progressColor = isSafeColor(colors.progress) ? colors.progress : null;

                // Circle style — SVG gradient + text glow
                const gradient = document.getElementById('widgetGradient');
                if (gradient) {
                    const stops = gradient.querySelectorAll('stop');
                    if (stops.length >= 2) {
                        if (timerColor) { stops[0].setAttribute('stop-color', timerColor); }
                        if (progressColor) { stops[1].setAttribute('stop-color', progressColor); }
                    }
                }
                if (timerColor && this.timeDisplay) {
                    this.timeDisplay.style.setProperty('--glow-color', `${timerColor}80`);
                }

                // Digital style — save base color, skip if in danger/overtime
                if (timerColor) {
                    this._baseTimerColor = timerColor;
                    this._baseDigitalGlow = `0 0 10px ${timerColor}, 0 0 20px ${timerColor}, 0 0 40px ${timerColor}66`;
                }
                if (timerColor && this.widgetDigitalTime && !this.widgetDigitalTime.dataset.status?.match(/danger|overtime/)) {
                    this.widgetDigitalTime.style.color = timerColor;
                    this.widgetDigitalTime.style.textShadow = this._baseDigitalGlow;
                }

                // Flip style — save base color, skip if in danger/overtime
                if (timerColor) {
                    document.querySelectorAll('.widget-flip-digit').forEach(el => {
                        if (!el.closest('[data-status="danger"]') && !el.closest('[data-status="overtime"]')) {
                            el.style.color = timerColor;
                        }
                    });
                    document.querySelectorAll('.widget-flip-separator').forEach(el => {
                        el.style.color = timerColor;
                    });
                }

                // Analog style
                const secondHand = document.getElementById('widgetHandSecond');
                const clockCenter = document.getElementById('widgetClockCenter');
                const analogDigital = document.getElementById('widgetAnalogDigital');
                if (progressColor && secondHand) {
                    secondHand.style.background =
                        `linear-gradient(180deg, ${timerColor || progressColor} 0%, ${progressColor} 100%)`;
                }
                if (timerColor && clockCenter) {
                    clockCenter.style.background = `linear-gradient(145deg, ${timerColor}, ${progressColor || timerColor})`;
                    clockCenter.style.boxShadow = '';
                }
                if (timerColor && analogDigital) {
                    analogDigital.style.color = `${timerColor}b3`;
                    analogDigital.style.textShadow = `0 0 10px ${timerColor}4d`;
                }
            }

            applyBackground(settings) {
                const bgCircle = document.querySelector('.bg-circle');
                const bgImageContainer = document.getElementById('widgetBgImage');
                const bgImg = document.getElementById('widgetBgImg');
                const bgOverlay = document.getElementById('widgetBgOverlay');

                if (!bgCircle) return;

                // Сбрасываем фоновое изображение
                bgImageContainer.style.display = 'none';

                const isSafeBgColor = (v) => typeof v === 'string' && /^#[0-9a-fA-F]{3,8}$|^rgba?\([\d,.\s%]+\)$/.test(v);

                switch (settings.bgMode) {
                    case 'solid':
                        bgCircle.style.fill = isSafeBgColor(settings.bgSolid) ? settings.bgSolid : '#1a1a2e';
                        break;

                    case 'gradient':
                        // Создаем или обновляем градиент для фона
                        let bgGradient = document.getElementById('widgetBgGradient');
                        if (!bgGradient) {
                            const defs = document.querySelector('.widget-svg defs');
                            bgGradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                            bgGradient.setAttribute('id', 'widgetBgGradient');
                            bgGradient.setAttribute('x1', '0%');
                            bgGradient.setAttribute('y1', '0%');
                            bgGradient.setAttribute('x2', '100%');
                            bgGradient.setAttribute('y2', '100%');
                            bgGradient.innerHTML = '<stop offset="0%" /><stop offset="100%" />';
                            defs.appendChild(bgGradient);
                        }
                        const stops = bgGradient.querySelectorAll('stop');
                        stops[0].setAttribute('stop-color', isSafeBgColor(settings.bgGrad1) ? settings.bgGrad1 : '#1a1a2e');
                        stops[1].setAttribute('stop-color', isSafeBgColor(settings.bgGrad2) ? settings.bgGrad2 : '#16213e');
                        bgCircle.style.fill = 'url(#widgetBgGradient)';
                        break;

                    case 'local':
                        if (settings.bgLocalImage && window.SecurityUtils &&
                            window.SecurityUtils.isValidDataURL(settings.bgLocalImage)) {
                            bgImageContainer.style.display = 'block';
                            bgImg.src = settings.bgLocalImage;
                            bgImg.style.objectFit = settings.bgLocalFit || 'cover';
                            const overlayOpacity = (settings.bgLocalOverlay || 30) / 100;
                            bgOverlay.style.background = `rgba(0, 0, 0, ${overlayOpacity})`;
                            bgCircle.style.fill = 'rgba(0, 0, 0, 0.1)';
                        }
                        break;

                    default:
                        bgCircle.style.fill = 'rgba(15, 15, 25, 0.85)';
                }
            }

            loadBackgroundSettings() {
                const bgSettings = localStorage.getItem('displayExtSettings');
                if (bgSettings) {
                    const settings = safeJSONParse(bgSettings, {});

                    if (settings && Object.keys(settings).length > 0) {
                        // Виджет всегда прозрачный — картинки только на полноэкранном дисплее
                        if (settings.bgMode === 'local') {
                            settings.bgMode = 'default';
                        }

                        this.applyBackground(settings);

                        // Применяем стиль таймера
                        if (settings.timerStyle) {
                            this.setTimerStyle(settings.timerStyle);
                        }
                    }
                }
            }

            setupIPC() {
                ipcRenderer.send('get-timer-state');

                // Сохраняем ссылки на обработчики для последующей очистки
                this.timerStateHandler = (event, state) => {
                    // FIX: Use monotonic updateCounter instead of timestamp for dedup
                    const updateCounter = state.updateCounter || 0;
                    if (updateCounter > 0 && updateCounter <= this.lastUpdateCounter) return;
                    this.lastUpdateCounter = updateCounter;
                    this.lastTimestamp = state.timestamp || Date.now();

                    this.totalSeconds = Number(state.totalSeconds) || 0;
                    this.remainingSeconds = Number(state.remainingSeconds) || 0;
                    this.isRunning = !!state.isRunning;
                    this.isPaused = !!state.isPaused;

                    this.updateDisplay();
                };

                this.colorsUpdateHandler = (event, colors) => {
                    this.applyColors(colors);
                };

                this.displaySettingsUpdateHandler = (event, settings) => {
                    // Виджет всегда прозрачный — фоновые картинки только на полноэкранном дисплее
                    const widgetSettings = { ...settings };
                    if (widgetSettings.bgMode === 'local') {
                        widgetSettings.bgMode = 'default';
                    }
                    this.applyBackground(widgetSettings);
                    // Применяем стиль из display-settings только если нет отдельного widget-style
                    if (settings.timerStyle && !this._hasWidgetStyle) {
                        this.setTimerStyle(settings.timerStyle);
                    }
                    // Показ цифр на аналоговом циферблате
                    if (settings.showAnalogNumbers !== undefined && this.widgetClockNumbers) {
                        this.widgetClockNumbers.classList.toggle('visible', settings.showAnalogNumbers);
                    }
                };

                this.widgetStyleUpdateHandler = (event, settings) => {
                    if (settings.timerStyle) {
                        this._hasWidgetStyle = true;
                        this.setTimerStyle(settings.timerStyle);
                    }
                    if (settings.timerScale !== undefined) {
                        const scale = parseInt(settings.timerScale) || 100;
                        const newSize = Math.round(250 * scale / 100);
                        ipcRenderer.send('widget-resize', { width: newSize, height: newSize });
                    }
                    applyShowTicks(settings?.showTicks ?? false);
                };

                // Регистрируем обработчики
                ipcRenderer.on('timer-state', this.timerStateHandler);
                ipcRenderer.on('colors-update', this.colorsUpdateHandler);
                ipcRenderer.on('widget-colors-update', this.colorsUpdateHandler);
                ipcRenderer.on('display-settings-update', this.displaySettingsUpdateHandler);
                ipcRenderer.on('widget-style-update', this.widgetStyleUpdateHandler);
            }

            cleanup() {
                // Удаляем IPC listeners
                if (this.timerStateHandler) {
                    ipcRenderer.removeListener('timer-state', this.timerStateHandler);
                }
                if (this.colorsUpdateHandler) {
                    ipcRenderer.removeListener('colors-update', this.colorsUpdateHandler);
                    ipcRenderer.removeListener('widget-colors-update', this.colorsUpdateHandler);
                }
                if (this.displaySettingsUpdateHandler) {
                    ipcRenderer.removeListener('display-settings-update', this.displaySettingsUpdateHandler);
                }
                if (this.widgetStyleUpdateHandler) {
                    ipcRenderer.removeListener('widget-style-update', this.widgetStyleUpdateHandler);
                }

                // Удаляем DOM и IPC handlers из _handlers
                const h = this._handlers || {};
                if (h.onResizeScaling) { window.removeEventListener('resize', h.onResizeScaling); }
                if (h.onResizeScalePct) { window.removeEventListener('resize', h.onResizeScalePct); }
                if (h.onMouseMove) { document.removeEventListener('mousemove', h.onMouseMove); }
                if (h.onMouseUp) { document.removeEventListener('mouseup', h.onMouseUp); }
                if (h.onKeyDown) { document.removeEventListener('keydown', h.onKeyDown); }
                if (h.onWheel) { document.removeEventListener('wheel', h.onWheel); }
                if (h.onContainerMouseDown && this.container) {
                    this.container.removeEventListener('mousedown', h.onContainerMouseDown);
                }
                if (h.onDisplayWindowState) {
                    ipcRenderer.removeListener('display-window-state', h.onDisplayWindowState);
                }
                if (h.onClockWindowState) {
                    ipcRenderer.removeListener('clock-window-state', h.onClockWindowState);
                }
                this._handlers = {};

                // Очищаем интервал обновления
                if (this.updateInterval) {
                    clearInterval(this.updateInterval);
                    this.updateInterval = null;
                }

                // Очищаем mouseTimeout
                if (this.mouseTimeout) {
                    clearTimeout(this.mouseTimeout);
                    this.mouseTimeout = null;
                }
                if (this._scalingTimer) {
                    clearTimeout(this._scalingTimer);
                    this._scalingTimer = null;
                }
            }
            
            setTimerStyle(style) {
                this.timerStyle = style;
                
                // Скрываем все стили
                if (this.circularWidget) this.circularWidget.classList.remove('active');
                if (this.widgetDigital) this.widgetDigital.classList.remove('active');
                if (this.widgetFlip) this.widgetFlip.classList.remove('active');
                if (this.widgetAnalog) this.widgetAnalog.classList.remove('active');
                
                // Показываем выбранный
                switch (style) {
                    case 'circle':
                        if (this.circularWidget) this.circularWidget.classList.add('active');
                        break;
                    case 'digital':
                        if (this.widgetDigital) this.widgetDigital.classList.add('active');
                        break;
                    case 'flip':
                        if (this.widgetFlip) this.widgetFlip.classList.add('active');
                        break;
                    case 'analog':
                        if (this.widgetAnalog) this.widgetAnalog.classList.add('active');
                        break;
                }
                
                // Обновляем масштабирование после смены стиля
                if (this._scalingTimer) { clearTimeout(this._scalingTimer); }
                this._scalingTimer = setTimeout(() => {
                    this._scalingTimer = null;
                    this.updateScaling();
                }, 50);

                this.updateDisplay();
            }

            updateDisplay() {
                const secs = Math.floor(this.remainingSeconds);
                const formatted = this.formatTime(secs);

                // Circle: split sign and digits — цифры остаются в центре даже в минусе
                if (this.timeDisplaySign && this.timeDisplayDigits) {
                    this.timeDisplaySign.textContent = secs < 0 ? '−' : '';
                    this.timeDisplayDigits.textContent = this.formatTime(Math.abs(secs));
                } else {
                    this.timeDisplay.textContent = formatted;
                }
                
                // Обновляем цифровой стиль
                if (this.widgetDigitalTime) {
                    this.widgetDigitalTime.textContent = formatted;
                }
                
                // Обновляем перекидные часы
                this.updateFlipDisplay(secs);
                
                // Обновляем аналоговые часы
                this.updateAnalogDisplay(secs);

                // Обновляем прогресс (для кругового)
                if (this.totalSeconds > 0) {
                    const ratio = Math.max(0, Math.min(1, this.remainingSeconds / this.totalSeconds));
                    const offset = this.circumference - (ratio * this.circumference);
                    this.progressBar.style.strokeDashoffset = offset;
                } else {
                    this.progressBar.style.strokeDashoffset = this.circumference;
                }

                // Status detection — always runs, not gated by totalSeconds
                const isOvertime = secs < 0;
                let status = 'normal';
                if (isOvertime) {
                    status = 'overtime';
                } else if (this.totalSeconds > 0) {
                    const percentLeft = (this.remainingSeconds / this.totalSeconds) * 100;
                    if (percentLeft <= 10 && percentLeft > 0) {
                        status = 'danger';
                    } else if (percentLeft <= 25) {
                        status = 'warning';
                    }
                }

                // Apply status to all elements
                this.progressBar.dataset.status = status;
                this.timeDisplay.dataset.status = status;

                // Circle time-display: force inline color for overtime/danger
                if (status === 'danger' || status === 'overtime') {
                    this.timeDisplay.style.color = '#ff4444';
                    this.timeDisplay.style.setProperty('--glow-color', 'rgba(255, 68, 68, 0.8)');
                } else if (status === 'warning') {
                    this.timeDisplay.style.color = '#ffc107';
                    this.timeDisplay.style.setProperty('--glow-color', 'rgba(255, 193, 7, 0.6)');
                } else {
                    this.timeDisplay.style.color = '';
                    if (this._baseTimerColor) {
                        this.timeDisplay.style.setProperty('--glow-color', `${this._baseTimerColor}80`);
                    }
                }

                // Digital time: force inline color
                if (this.widgetDigitalTime) {
                    this.widgetDigitalTime.dataset.status = status;
                    if (status === 'danger' || status === 'overtime') {
                        this.widgetDigitalTime.style.color = '#ff3333';
                        this.widgetDigitalTime.style.textShadow = '0 0 10px #ff3333, 0 0 20px #ff3333, 0 0 40px #ff333366';
                    } else if (status === 'warning') {
                        this.widgetDigitalTime.style.color = '#ffcc00';
                        this.widgetDigitalTime.style.textShadow = '0 0 10px #ffcc00, 0 0 20px #ffcc00, 0 0 40px #ffcc0066';
                    } else if (this._baseTimerColor) {
                        this.widgetDigitalTime.style.color = this._baseTimerColor;
                        this.widgetDigitalTime.style.textShadow = this._baseDigitalGlow || '';
                    } else {
                        this.widgetDigitalTime.style.color = '';
                        this.widgetDigitalTime.style.textShadow = '';
                    }
                }

                // Обновляем статус
                this.updateStatus(secs);

                // Класс для контейнера
                this.container.classList.toggle('timer-running', this.isRunning);
            }
            
            updateFlipDisplay(secs) {
                if (!this.wFlipMin1 || !this.wFlipMin2 || !this.wFlipSec1 || !this.wFlipSec2) return;
                
                const isNegative = secs < 0;
                const absSecs = Math.abs(secs);
                const hours = Math.floor(absSecs / 3600);
                const mins = Math.floor((absSecs % 3600) / 60);
                const seconds = absSecs % 60;
                
                // Показываем/скрываем знак минуса
                if (this.wFlipMinus) {
                    this.wFlipMinus.classList.toggle('visible', isNegative);
                }
                
                // Показываем/скрываем часы в зависимости от общего времени
                const showHours = this.totalSeconds >= 3600 || hours > 0;
                
                // Добавляем/удаляем класс для адаптивных размеров
                if (this.widgetFlip) {
                    this.widgetFlip.classList.toggle('has-hours', showHours);
                }
                
                if (this.wFlipHoursGroup && this.wFlipHoursSep) {
                    this.wFlipHoursGroup.style.display = showHours ? 'flex' : 'none';
                    this.wFlipHoursSep.style.display = showHours ? 'flex' : 'none';
                    
                    if (showHours && this.wFlipHr1 && this.wFlipHr2) {
                        const hr1 = String(Math.floor(hours / 10) % 10);
                        const hr2 = String(hours % 10);
                        this.wFlipHr1.querySelector('.widget-flip-digit').textContent = hr1;
                        this.wFlipHr2.querySelector('.widget-flip-digit').textContent = hr2;
                    }
                }
                
                const min1 = String(Math.floor(mins / 10) % 10);
                const min2 = String(mins % 10);
                const sec1 = String(Math.floor(seconds / 10));
                const sec2 = String(seconds % 10);
                
                // Обновляем цифры
                this.wFlipMin1.querySelector('.widget-flip-digit').textContent = min1;
                this.wFlipMin2.querySelector('.widget-flip-digit').textContent = min2;
                this.wFlipSec1.querySelector('.widget-flip-digit').textContent = sec1;
                this.wFlipSec2.querySelector('.widget-flip-digit').textContent = sec2;
                
                // Классы предупреждения
                // FIX BUG-018: Use data attributes instead of classList
                const flipCards = [this.wFlipMin1, this.wFlipMin2, this.wFlipSec1, this.wFlipSec2];
                if (showHours && this.wFlipHr1 && this.wFlipHr2) {
                    flipCards.push(this.wFlipHr1, this.wFlipHr2);
                }

                const isOvertime = secs < 0;
                let status = 'normal';
                if (isOvertime) {
                    status = 'overtime';
                } else if (this.totalSeconds > 0) {
                    const percentLeft = (this.remainingSeconds / this.totalSeconds) * 100;
                    if (percentLeft <= 10 && percentLeft > 0) {
                        status = 'danger';
                    } else if (percentLeft <= 25) {
                        status = 'warning';
                    }
                }

                flipCards.forEach(card => {
                    card.dataset.status = status;
                    // Override inline color set by applyColors()
                    const digit = card.querySelector('.widget-flip-digit');
                    if (digit) {
                        if (status === 'danger' || status === 'overtime') {
                            digit.style.color = '#ff4444';
                        } else if (status === 'warning') {
                            digit.style.color = '#ffc107';
                        } else if (this._baseTimerColor) {
                            digit.style.color = this._baseTimerColor;
                        }
                    }
                });

                // Color separators to match digit status
                document.querySelectorAll('.widget-flip-separator').forEach(el => {
                    if (status === 'danger' || status === 'overtime') {
                        el.style.color = '#ff4444';
                    } else if (status === 'warning') {
                        el.style.color = '#ffc107';
                    } else if (this._baseTimerColor) {
                        el.style.color = this._baseTimerColor;
                    }
                });
            }

            updateAnalogDisplay(secs) {
                if (!this.widgetHandMinute || !this.widgetHandSecond) return;

                const absSecs = Math.abs(secs);
                const totalMins = absSecs / 60;
                const seconds = absSecs % 60;

                // Минутная стрелка - полный оборот за 60 минут
                const minuteDeg = (totalMins / 60) * 360;
                this.widgetHandMinute.style.transform = `rotate(${minuteDeg}deg)`;

                // Секундная стрелка - полный оборот за 60 секунд
                const secondDeg = (seconds / 60) * 360;
                this.widgetHandSecond.style.transform = `rotate(${secondDeg}deg)`;

                // Обновляем цифровое время
                if (this.widgetAnalogDigital) {
                    const hours = Math.floor(absSecs / 3600);
                    const mins = Math.floor((absSecs % 3600) / 60);
                    const prefix = secs < 0 ? '-' : '';
                    if (hours > 0) {
                        this.widgetAnalogDigital.textContent = `${prefix}${hours}:${String(mins).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                    } else {
                        this.widgetAnalogDigital.textContent = `${prefix}${String(mins).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                    }
                }

                // FIX BUG-018: Use data attributes instead of classList
                const analogElements = [this.widgetHandMinute, this.widgetHandSecond, this.widgetClockCenter, this.widgetAnalogDigital];

                const isOvertime = secs < 0;
                let status = 'normal';
                if (isOvertime) {
                    status = 'overtime';
                } else if (this.totalSeconds > 0) {
                    const percentLeft = (this.remainingSeconds / this.totalSeconds) * 100;
                    if (percentLeft <= 10 && percentLeft > 0) {
                        status = 'danger';
                    } else if (percentLeft <= 25) {
                        status = 'warning';
                    }
                }

                analogElements.forEach(el => {
                    if (el) { el.dataset.status = status; }
                });

                // Override inline colors for analog overtime
                if (status === 'danger' || status === 'overtime') {
                    if (this.widgetHandSecond) {
                        this.widgetHandSecond.style.background = '#ff453a';
                        this.widgetHandSecond.style.boxShadow = '';
                    }
                    if (this.widgetClockCenter) {
                        this.widgetClockCenter.style.background = '#ff453a';
                        this.widgetClockCenter.style.boxShadow = '';
                    }
                    if (this.widgetAnalogDigital) {
                        this.widgetAnalogDigital.style.color = 'rgba(255,69,58,0.7)';
                    }
                }
            }

            updateStatus(secs) {
                this.statusBadge.classList.remove('running', 'paused', 'finished');

                if (secs < 0 && this.isRunning) {
                    this.statusBadge.textContent = 'Перерасход';
                    this.statusBadge.classList.add('running');
                } else if (secs <= 0 && this.totalSeconds > 0 && !this.isRunning) {
                    this.statusBadge.textContent = 'Завершён';
                    this.statusBadge.classList.add('finished');
                } else if (this.isRunning) {
                    this.statusBadge.textContent = 'Активен';
                    this.statusBadge.classList.add('running');
                } else if (this.isPaused) {
                    this.statusBadge.textContent = 'Пауза';
                    this.statusBadge.classList.add('paused');
                } else {
                    this.statusBadge.textContent = 'Готов';
                }
            }

            formatTime(seconds) {
                return window.TimeUtils.formatTimeShort(seconds);
            }
        }

        // Show hint on first open or after hint update (v2 = added wheel info)
        if (localStorage.getItem('widgetHintShown') === 'v2') {
            const h = document.getElementById('widgetHint');
            if (h) { h.style.display = 'none'; }
        } else {
            localStorage.setItem('widgetHintShown', 'v2');
        }

        const widgetTimer = new WidgetTimer();

        // Cleanup при закрытии окна
        window.addEventListener('beforeunload', () => {
            widgetTimer.cleanup();
        });
    </script>
</body>
</html>
